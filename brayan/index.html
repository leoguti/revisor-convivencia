            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;

        .stat-card {
            background: #2d2d2d;
            border: 1px solid #FFD700;
            padding: 15px;
            border-radius: 8px;
            text-align: center;

            font-size: 1.1em;

            height: 35px;
            background: #1a1a1a;
            border: 2px solid #FFD700;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            margin-bottom: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .bar-justa {
            background: linear-gradient(90deg, #22C55E, #16A34A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-injusta {
            background: linear-gradient(90deg, #EF4444, #DC2626);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #E6C200;
        }

        .bar-label-justa {
            color: #22C55E;
            font-weight: bold;
        }

        .bar-label-injusta {
            color: #EF4444;
            font-weight: bold;
        }

            margin-top: 25px;
        }

        .rights-violation-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .rights-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-item {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right-name {
            color: #E6C200;
            flex: 1;
        }

        .right-count {
            background: #8B0000;
            color: #FFD700;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .no-data {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 15px;
        }

        .stat-card.no-cases {
            grid-column: 1 / -1;
        }

        /* Formulario */
        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: bold;
            font-size: 1.1em;
        }

        select,
        textarea,
        input[type="radio"] {
            padding: 10px;
            border: 2px solid #FFD700;
            background-color: #1a1a1a;
            color: #FFD700;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1em;
        }

        select {
            width: 100%;
            cursor: pointer;
        }

        select option {
            background-color: #1a1a1a;
            color: #FFD700;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        /* Opciones de radio */
        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-group label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            font-weight: normal;
            gap: 10px;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        /* Botón */
        button {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            color: #FFD700;
            padding: 15px 40px;
            border: 2px solid #FFD700;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-clear {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            padding: 10px 20px;
            font-size: 0.9em;
            width: auto;
            margin-top: 10px;
        }

        /* Área de análisis */
        .analysis-section {
            margin-top: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 30px;
            display: none;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
            max-height: 80vh;
            overflow-y: auto;
        }

        .analysis-section.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cargando */
        .loading-container {
            text-align: center;
            padding: 40px 20px;
        }

        .loading-text {
            color: #FFD700;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .semaphore {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            border-radius: 10px;
        }

        .semaphore-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .semaphore.green {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22C55E;
        }

        .semaphore.green .semaphore-icon {
            color: #22C55E;
        }

        .semaphore.green .semaphore-title {
            color: #22C55E;
        }

        .semaphore.yellow {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #EAB308;
        }

        .semaphore.yellow .semaphore-icon {
            color: #EAB308;
        }

        .semaphore.yellow .semaphore-title {
            color: #EAB308;
        }

        .semaphore.red {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #EF4444;
        }

        .semaphore.red .semaphore-icon {
            color: #EF4444;
        }

        .semaphore.red .semaphore-title {
            color: #EF4444;
        }

        .semaphore-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .semaphore-description {
            color: #E6C200;
            font-size: 1.1em;
        }

        /* Contenido de análisis */
        .analysis-content {
            color: #E6C200;
            line-height: 1.8;
        }

        .analysis-content h2 {
            color: #FFD700;
            font-size: 1.3em;
            margin-top: 20px;
            margin-bottom: 12px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 8px;
        }

        .analysis-content h2:first-child {
            margin-top: 0;
        }

        .analysis-content strong {
            color: #FFD700;
        }

        .analysis-content ul,
        .analysis-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .analysis-content li {
            margin-bottom: 8px;
        }

        .analysis-content p {
            margin-bottom: 12px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #EF4444;
            color: #EF4444;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;

            border: 2px solid #EAB308;
            color: #EAB308;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        /* SECCIÓN DE CASOS SIMILARES */
        .similar-cases-section {
            background: #8B0000;
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;

        .similar-cases-title {

            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;

        .similar-case-card {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin: 12px 0;

        .case-header {

            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;

        .case-date {
            color: #E6C200;
            font-size: 0.9em;
            font-style: italic;
        }

        .case-verdict {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .case-verdict.justa {
            background: rgba(34, 197, 94, 0.3);
            color: #22C55E;
            border: 1px solid #22C55E;
        }

        .case-verdict.injusta {
            background: rgba(239, 68, 68, 0.3);
            color: #EF4444;
            border: 1px solid #EF4444;
        }

        .case-fault {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .case-sanction {
            color: #E6C200;
            margin-bottom: 8px;
        }

        .no-cases {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .similarity-score {
            color: #FFD700;
            font-size: 0.9em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #FFD700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

                font-size: 1em;
            }

                border: 2px solid #FFD700;
            }

            .stats-grid {
                grid-template-columns: 1fr;

            }

            .semaphore-title {
                font-size: 1.4em;

            .case-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .analysis-section {
                max-height: 70vh;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 30px 15px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .container {
                padding: 15px;
            }

            label {
                font-size: 1em;
            }

            .analysis-section {
                padding: 20px;
                max-height: 60vh;
            }

            .semaphore-icon {
                font-size: 2.5em;
            }

            .semaphore-title {
                font-size: 1.2em;
            }

            .stats-title {
                font-size: 1.2em;
            }

            .stat-number {
                font-size: 2em;
            }

            .justice-bar-title {
                font-size: 1em;
            }
        }
    </style>

PRESENTACIÓN

El Manual de Convivencia del Colegio Salesiano de Duitama, es un
componente de nuestro PEPS PEI, documento de referencia obligatorio
para los miembros de la comunidad educativa pastoral y para quienes
aspiran a serlo. Reúne los principios, la filosofía, valores, acuerdos,
normas, derechos, deberes, procedimientos, rutas de atención integral,
protocolos, el espíritu que fundamenta la Institución, y las
particularidades de su funcionamiento. Conocer y adoptar su contenido,
facilita las relaciones dentro de la comunidad y contribuye a generar un
ambiente de confianza y respeto mutuo, necesario para el cumplimiento
de la misión educativa y formativa institucional.
De esta manera, se ha revisado y modificado bajo la coordinación del
Comité de Convivencia Escolar del establecimiento que convocó
representantes de todos los estamentos de la comunidad, para así
facilitar su aprobación, derivar legitimidad y asegurar el respeto de su
contenido; se debe constituir entonces en un nuevo generador de
reflexión y debate sobre la vida escolar y la formación de Buenos
cristianos y honestos ciudadanos.
El Manual de Convivencia Escolar tiene carácter de norma o disposición
legal que regula el contrato de matrícula.
El principio fundamental que guía las prácticas de este Manual es el
reconocimiento de niñas, niños, adolescentes y jóvenes como sujetos
plenos de derechos y deberes. En consecuencia, todos los miembros de
la CEP del Colegio Salesiano de Duitama se comprometen a garantizar,
vivir e implementar estos derechos y deberes en cada aspecto de su labor

FUNDAMENTOS LEGALES

El presente Manual de Convivencia tiene su fundamento legal y jurídico:
Constitución Política de Colombia: Atiende lo dispuesto en la carta
constitucional, respecto a la vida en comunidad en las instituciones
educativas. Artículo 67, “la educación es un derecho de la persona y un
servicio público que tiene una función social; con ella se busca el acceso
al conocimiento, a la ciencia, a la técnica, y a los demás bienes y valores
de la cultura. La educación formará al colombiano en el respeto a los
derechos humanos, a la paz y a la democracia; y en la práctica del trabajo
y la recreación, para el mejoramiento cultural, científico, tecnológico y
para la protección del ambiente. Artículo 7: El Estado reconoce y protege
la diversidad étnica y cultural de la Nación colombiana.
Ley General de Educación 115 de 1994: Establece los fines y los
objetivos de la educación colombiana y ordena en su artículo 87, la
estructuración de un Manual de convivencia, concibiéndolo de la
siguiente forma: “los establecimientos educativos tendrán un reglamento
o manual de convivencia, en el cual se definan los derechos y
obligaciones, de los estudiantes. Los padres o tutores y los educandos al
firmar la matrícula correspondiente en representación de sus hijos
estarán aceptando el mismo”.
Ley 715 de 2001: Por la cual se dictan normas orgánicas en materia de
recursos y competencias de conformidad con los artículos 151, 288, 356
y 357 (Acto Legislativo 01 de 2001) de la Constitución Política y se dictan
otras disposiciones para organizar la prestación de los servicios de
educación y salud, entre otros.

MÓDULO 1. EL COLEGIO

1.1. FILOSOFÍA EDUCATIVA
El Proyecto Educativo Pastoral Salesiano, tiene como fundamento
pedagógico la experiencia de Don Bosco, cuyos pilares son asumir la
educación como una acción vital y de fe, asumiendo el sistema preventivo
como una forma de vivir desde la pedagogía, la pastoral y la
espiritualidad. Como pedagogía se trata de acompañar y orientar al joven
en su formación integral como pastoral, es una experiencia basada en el
amor centrada en Cristo, en su mensaje y en los valores del evangelio y
como espiritualidad es la vivencia diaria de Dios, Dios hecho realidad en
la vida escolar, comunitaria e individual como fundamento de la libertad
y el desarrollo personal. A la luz de esta convicción, se definen algunos
criterios que caracterizan el Modelo Educativo Salesiano:
● Un ambiente educativo familiar y comunitario, que es vehículo y
propuesta de valores, donde se respira un clima de familia,
manifiesto en relaciones interpersonales entre educadores y
educandos hasta llegar a la comunión de ideales y valores.
● Una llamada a las fuerzas interiores: razón, amabilidad y religión,
que son, por una parte, dinamismo interior para que el estudiante
se oriente con responsabilidad en la elección de lo bueno y
verdadero y, por otra, un criterio de acción educativa.

1.2. CARACTERÍSTICAS DEL COLEGIO

carácter privado, de propiedad de la COMUNIDAD SALESIANA,

que ofrece el servicio educativo mixto, en jornada completa
legalmente reconocido por las autoridades del País, de confesión

1.3. DIRECCIONAMIENTO ESTRATÉGICO
1.3.1. NUESTRA MISIÓN
El Colegio Salesiano de Duitama es una Comunidad Educativo Pastoral
privada y católica, que educa y evangeliza a través de la educación
formal en los niveles de preescolar, básica y media técnica, a niños,
niñas, adolescentes y jóvenes, formándolos integralmente como buenos
cristianos y honestos ciudadanos, enmarcados en el Ecosistema
Educativo Salesiano, para ser agentes de transformación en su
ambiente.
1.3.2. NUESTRA VISIÓN
Para el año 2030, el Colegio Salesiano de Duitama se proyecta como una
Comunidad Educativo Pastoral en formación permanente, significativa y
sostenible con ambientes que favorezcan la innovación educativa, la

investigación, la formación técnica y el aprendizaje colaborativo e
incluyente, buscando la identidad de ser animadores juveniles con
liderazgo comunitario.
1.3.3. POLÍTICA DE CALIDAD
Somos una Comunidad Educativa Pastoral comprometida con la
formación integral de nuestros destinatarios y la calidad del servicio
educativo que ofrecemos, mejorando continuamente nuestros procesos
formativos, desde el Carisma de Don Bosco, conforme a la normatividad
legal vigente y los principios del Sistema de Gestión de la Calidad.
1.3.4. OBJETIVOS ESTRATEGICOS
● Orientar a la CEP desde los principios y fundamentos institucionales
a través de una cultura de calidad buscando un mejoramiento
continuo.
● Promover el desarrollo de competencias para una formación integral
de nuestros destinatarios desde los procesos formativos con el
Carisma de Don Bosco garantizando la calidad del servicio
educativo.
● Administrar eficientemente los recursos y el talento humano, de
forma coherente con los fines de la misión institucional.

1.3.5. NUESTROS VALORES
Para desarrollar nuestra opción de “ANIMADORES JUVENILES CON
LIDERAZGO COMUNITARIO” vemos la necesidad de impulsar los
siguientes valores:
● SINCERIDAD- HONESTIDAD – TRANSPARENCIA: Es una actitud
básica que plantea y estimula un tipo de relación clara, franca y
abierta entre dos o más personas, así mismo, la honestidad es una
cualidad humana que consiste en comportarse y expresarse con
coherencia y sinceridad, y de acuerdo con los valores de verdad y
justicia. Cuando un ser humano es honesto se comporta de manera
transparente con sus semejantes, es decir, es sincero, no oculta
nada, no toma nada ajeno, ni espiritual ni material.
● RESPETO– JUSTICIA: Es reconocer, apreciar y valorarse a sí
mismo como persona, así como a los demás, y a nuestro entorno.
Implica, por un lado, el respeto que se expresa como una condición
de equidad y justicia, donde la convivencia pacífica se logra sólo si
consideramos que este valor es una condición para vivir en paz con
las personas que nos rodean. Pero es, al mismo tiempo, el vivir con
amabilidad (vivir la “AMOREVOLEZZA”), nota suprema de vida y de
acción de la pedagogía humanista salesiana, inspirada en Jesús en
su caminar y encuentro con los “pequeños de mi Padre”: niños,
jóvenes, mujeres y necesitados.
● RESPONSABILIDAD: Valor que está en la conciencia de la
persona, que le permite reflexionar, administrar, orientar y valorar las
consecuencias de sus actos. Es la actitud de la persona agradecida
de los dones recibidos, que la lleva a sentirse comprometida con sus

actos y sus consecuencias. Es el saber asumir la libertad
conscientemente con compromiso social.
● SOLIDARIDAD: Actitud habitual de disponerse espontáneamente al
servicio de quien tenga necesidad. Para poder estar disponibles y
solidarios hay que estar convencido de que la vida nos ha sido dada
a favor de los demás. Yo existo para los demás, en función de los
demás y para realizarme como persona, necesito de los demás. Es
mejor dar que recibir. Tengo el derecho de experimentar la alegría de
darme a los demás y así ser cada día más feliz. Es saber ser prójimo
de los demás. Es una exigencia de convivencia humana.
● GRATUIDAD: Todo don obliga. Un sincero “dar las gracias” equivale
a reconocer que aceptamos lo que recibimos y lo aceptamos como
nos viene dado, pero al mismo tiempo manifestamos que no tenemos
nada para corresponder y por eso ese don lo colocamos en posición
de respuesta. Podemos entender que todo lo que se intercambia en
gratuidad (todo lo que se da al otro o se recibe del otro), nunca es un
“objeto” determinado, sino como un nuevo punto de partida para el
contra-don.
● ESPÍRITU ECOLÓGICO: Es vivir en armonía con el entorno socia
ambiental, creando relaciones de corresponsabilidad en el cuidado y
la preservación de los seres vivos y la naturaleza. Corresponde a su
participación en los procesos que garantizan el desarrollo humano
integral y sostenible.
● EL HUMANISMO CRISTIANO: Que afirma el valor absoluto de la
persona humana como hijo e hija de Dios, reconoce y defiende sus
derechos fundamentales como garantía del respeto a su dignidad.

Esto lleva a captar los auténticos valores presentes en el mundo, a
buscar con sabiduría la cooperación de todos y a creer en la fuerza
de la educación que acompaña el crecimiento del niño y del joven.
● LA ESPIRITUALIDAD SALESIANA: Es nuestra manera peculiar de
vivir el seguimiento de Jesucristo, a ejemplo de San Juan Bosco,
siendo particularmente sensibles a algunos rasgos de Jesús,
presente en los Evangelios: Caridad pastoral, predilección por los
pequeños, centralidad de la misericordia, la reconciliación y el valor
de la comunidad como lugar de formación humana y cristiana.
● EMPATÍA: Es la capacidad de ponerse en el lugar del otro,
comprender sus sentimientos, alegrías y dificultades, respondiendo
con respeto, amabilidad y cariño. En el ambiente salesiano la
empatía se vive como una expresión concreta del amor que educa.
Escuchar con el corazón, acompañar con paciencia y acoger sin
juzgar. Ser empático es mirar a los demás con los ojos de Jesús,
reconociendo en cada persona un hijo o hija de Dios que merece ser
comprendido, valorado y apoyado.
● CORRESPONSABILIDAD: Es el compromiso de cada miembro de
la comunidad educativa en la construcción del bien común. En el
espíritu salesiano, significa asumir con alegría y sentido de
pertenencia las tareas, deberes y decisiones que nos ayudan a
crecer juntos. Ser corresponsables es reconocer que todos
estudiantes, familias, educadores y personal de apoyo (CEP) somos
parte de una misma misión: Formar buenos cristianos y honrados
ciudadanos. Desde la confianza, el diálogo y la colaboración, vivimos
la corresponsabilidad como un camino de servicio, participación y
amor por la casa común.

MÓDULO 2. NORMALIZACIÓN Y CONVIVENCIA
La Normalización y Convivencia Es un estilo de vida personal y
comunitaria. Ambas están orientadas por los principios y los valores
promovidos por la Institución, los cuales regulan el comportamiento
personal y social a través de pautas concretas, lo cual da garantía plena
de los derechos de los distintos miembros que conforman la comunidad
educativa y la eliminación de toda práctica que conlleve a marginación,
segregación o discriminación de cualquier tipo. En la medida en que el
estudiante acepte e interiorice estos principios y valores podrá tomar
decisiones de manera libre, responsable y autónoma; actuando por
convicción en un ambiente de libre y sana convivencia, con
responsabilidad social.

DE LOS PADRES DE FAMILIA/ACUDIENTES
Para los fines previstos en la presente norma, la expresión “Padres de
Familia” comprende a los padres y madres de familia, así como a los
acudientes o quienes ejercen la patria potestad, representante legal o
acudientes debidamente autorizados.
Artículo 1. La familia es el núcleo responsable del proceso formativo
integral de sus hijos o acudidos y según lo señala la Constitución
Nacional, debe educarlos conjuntamente con la Institución, teniendo en
cuenta:

a. Conocer e interiorizar la Filosofía del Colegio (antes de matricular a
su hijo/a).
b. Proporcionar a sus hijos un ambiente de comprensión y respeto
dentro del hogar, propicio para el cumplimiento de sus deberes
escolares.
c. Responsabilizarse de la formación y educación de sus hijos en
concordancia con los lineamientos establecidos por la Constitución
Política; Artículo 17 de la Ley 115; Código de la Infancia y de la
Adolescencia y por el presente Manual de Convivencia.
d. Acompañar adecuadamente el proceso de Formación Integral y velar
por el cumplimiento de las obligaciones escolares de sus hijos/as,
dentro y fuera del Colegio y participar en las actividades del Colegio
a las que sean convocados.
e. Autorizar al Colegio Salesiano de Duitama la posibilidad de utilizar
fotografías o imágenes de sus hijos/as, para los diferentes medios de
comunicación del Colegio, preservando el respeto y el buen nombre
de ellos/as.
f. Verificar que sus hijos lleven al colegio sólo lo requerido para sus
diferentes actividades escolares, previniendo pérdida de objetos de
valor o altas sumas de dinero.
g. Acercarse personalmente para averiguar sobre el comportamiento y
rendimiento académico de su hijo o acudido, durante el horario
establecido.
h. Demostrar lealtad con el colegio respaldando sus decisiones,
velando por su prestigio y buen nombre, evitando comentarios
infundados y destructivos.
i. Informarse frecuentemente a través de los diferentes medios
(Plataforma institucional) acerca del proceso de formación integral
que siguen sus hijos/as en el Colegio.

INASISTENCIA AL COLEGIO
El caso de inasistencia injustificada de los estudiantes, será manejado
desde la Coordinación de Convivencia de acuerdo con el siguiente
procedimiento:
a. Por inasistencia a una (1) hora de clase, el/la educador/a debe
informar inmediatamente al Coordinador(a) de Convivencia, con el fin
de verificar la presencia o no del estudiante dentro del
establecimiento y registrar la inasistencia en la plataforma
institucional. Dado el caso, se considera como evasión y queda
registrado en el observador del estudiante.
b. Para una (1) jornada completa el padre de familia informará a
coordinación de convivencia el motivo de la ausencia.

c. Ante la continua inasistencia al Colegio sin justificación, el caso se
remitirá a Comité de Convivencia.
d. Todas las inasistencias quedarán registradas en la plataforma de la
Institución, los acudientes pueden ingresar y revisar dichas
novedades que se registran día a día, de lo contrario deben
comunicarse con el colegio (Coordinación de convivencia) para
conocer pormenores.

cualquier solicitud de permiso debe llegar a la Coordinación de
Convivencia por escrito, firmada por el acudiente o mediante carta al
correo coordinacionconvivencia@colegiosalesianoduitama.com /
https://edu.esemtia.co/ con su respectivo soporte. (No se atenderán
peticiones por teléfono).

COMPROMISO CON UNA CULTURA AUTO SOSTENIBLE:
Es de vital importancia que todos los miembros de la comunidad escolar
aprendan a cuidar y a respetar su entorno como fundamento de
supervivencia y de armonía con la naturaleza. Todas las áreas y
actividades deben estar al servicio de este aprendizaje continuo, así:
● Velando por la limpieza y el uso respetuoso de los recursos del
Colegio y evitando cualquier acto que atente contra sus
instalaciones y dotaciones.
● Generando la menor cantidad de basura posible y seleccionarla en
diversos recipientes para su posterior reciclaje.
● Preservando los recursos naturales y evitando cualquier derroche.
Consumirá el mínimo posible de energía eléctrica, agua, y papel.
El estudiante e integrantes de la comunidad educativa deben depositar
las basuras dentro de los recipientes dispuestos para ello. Toda la
Comunidad Educativa debe estar atenta a colaborar con la buena
presentación del Colegio y el cuidado del entorno.

PARÁGRAFO 2: Propiedad Intelectual: Los trabajos de los estudiantes
son propiedad intelectual de cada uno y los profesores los respetan
mediante su firma en el contrato laboral. Los trabajos colectivos
elaborados por los estudiantes en los wikis o métodos similares de

PARÁGRAFO 3: Confidencialidad de la información personal. La

del estudiante (Procedimiento de Admisiones y matrícula), pudiendo
sólo realizar suministro o comunicación de datos personales cuando ello
corresponda al desarrollo de las actividades autorizadas en La Ley 1581
de 2012 y en los términos de la misma.
PARÁGRAFO 4: La organización de los cursos al inicio del año escolar
o durante el año, será potestad del Rector o coordinador de convivencia,
teniendo en cuenta necesidades académicas, de convivencia o
flexibilización de estudiantes con NEE.

3.1.1. BIENESTAR ESTUDIANTIL
Artículo 8. El Colegio Salesiano de Duitama considera el Bienestar
Escolar como el servicio que tiene como misión procurar la mayor
cantidad de bienestar posible en el plano académico y personal-social;
para el logro de un proyecto que apunte a la excelencia académica y al
desarrollo personal del estudiante. En tal sentido a través de las acciones
que desarrolla Psico orientación en coordinación con las Coordinaciones
de Pastoral, Académica y de Convivencia se pretende dar solución a las
diferentes crisis por las que atraviesan los estudiantes, las cuales son
generadas por su entorno familiar, escolar o social.
Al igual se cuentan con las escuelas de formación que son parte del
proyecto educativo pastoral del Colegio para la CEP, y que son parte
fundamentales en el desarrollo y crecimiento social, artístico y deportivo
de los estudiantes. El estudiante participa de forma activa y continua de
por lo menos una de las escuelas de formación artística y deportiva.
Parágrafo 1: En el marco de política institucional de educación inclusiva,
el colegio cuenta con el equipo de educación inclusiva conformado por
rector, coordinadoras, psico-orientación y docente de apoyo, con el fin de
generar todas aquellas acciones de acompañamiento de índole
pedagógico, técnico y administrativo de acuerdo a las responsabilidades
contempladas en el Decreto 1421 de 2017.

3.2. ORGANISMOS DE PARTICIPACIÓN
3.2.1. REPÚBLICA SALESIANA
Desde el punto de vista de la inspectoría Salesiana, la máxima autoridad
educativa es el Consejo Local Educativo Pastoral (CLEP) y desde el
contexto jurídico colombiano, el Gobierno Escolar lo ejerce la Rectoría,
el Consejo Directivo y el Consejo Académico en forma participativa.
Artículo 12. EL CONSEJO LOCAL EDUCATIVO PASTORAL: Es el
organismo que anima, coordina y orienta toda la obra salesiana del
colegio mediante la reflexión, el diálogo, la programación, el desarrollo y
la revisión de la acción educativo-pastoral. Se rige por lo establecido en
el cuadro de referencia de la pastoral juvenil salesiana.
Artículo 13. EL CONSEJO DIRECTIVO: Lo preside el Padre Rector y
está integrado por un representante de la Sociedad Salesiana, designado
por él, el Representante de los Estudiantes ante el Consejo Directivo, el
presidente del Consejo de Padres de Familia, un representante de la
Asociación de Padres de Familia, dos (2) representantes de los
profesores, un representante de Exalumnos, un representante del Sector
Productivo, los cuales se reunirán mensualmente.

CONSEJO DE PADRES DE FAMILIA (Decreto 1286 de 27 de abril de

Artículo 16. REPÚBLICA ESTUDIANTIL SALESIANA:
La República Salesiana busca replicar la estructura de un país,
fomentando la participación activa de los estudiantes en la vida escolar.
Los alumnos asumen roles de ciudadanos, y a través de elecciones
democráticas, eligen a sus representantes, como el presidente,
gobernadores, alcaldes, ministros, entre otros, quienes velan por el
bienestar y las necesidades de la comunidad educativa. Al igual que en
un país, se promulgan normas que favorecen la convivencia, se
organizan eventos para promover valores de solidaridad, respeto y
responsabilidad, y se asegura un entorno donde todos colaboren por el
bien común. Así, se fortalece el sentido de pertenencia y liderazgo entre
los estudiantes.

• OFICINA SALESIANA DE CONCILIACIÓN Y CONVIVENCIA
La Oficina Salesiana de Conciliación y Convivencia” busca promover la
resolución pacífica de conflictos entre los miembros de la comunidad
educativa, inspirada en los valores salesianos de diálogo, respeto y
fraternidad. Este espacio, ligado a una propuesta pedagógica basada en
el coaching, el manejo emocional y la resolución de conflictos, permite
abordar diferencias de manera constructiva, evitando la escalada de
tensiones. A través de la mediación y el acompañamiento, se busca
restaurar relaciones, fomentar el perdón y construir una cultura de paz y
convivencia, garantizando un ambiente armonioso basado en los
principios de justicia, solidaridad cristiana y bienestar emocional.
Integrado por equipo multidisciplinario:
Coordinadora de Convivencia Escolar, Psico orientadora escolar,
Docente líder en Resolución de Conflictos, Docente de apoyo, Docente
catedra de emociones y estudiantes que tengan la preparación y
liderazgo en resolución de conflictos.

MATRÍCULA Y PERMANENCIA
Somos una Institución comprometida con la educación integral y la
calidad del servicio que ofrecemos, para lo cual es pertinente que todos
los colaboradores vivan y respiren la cultura del servicio. En este sentido,
resulta de vital importancia que seamos replicadores de este valor

objetivo.
4.1. INSCRIPCIÓN Y REQUISITOS
Artículo 19. La inscripción es el proceso por el cual las familias
aspirantes a ingresar solicitan ser partícipes del proceso de inducción a
la Comunidad Educativa de acuerdo con las disposiciones
institucionales.
Son requisitos obligatorios de inscripción:
1. Para quienes ingresan al Ciclo Exploratorio (Grado Jardín y
Cero), tener la edad requerida de 4 y 5 años cumplidos en el
primer semestre del año.
2. Realizar los siguientes pasos:
• Cancelar costo del formulario de inscripción.
• Ingresar a la página Web del Colegio:
www.colegiosalesianoduitama.com, en la ventana de
inscripciones diligenciar el formulario de estudiante
nuevo.
• Una vez realizado el diligenciamiento del formulario,
enviar al correo electrónico
admisiones@colegiosalesianoduitama.com los
documentos requeridos.

3. Para el caso de los estudiantes con discapacidad, es necesario
que los padres de familia aporten documentación de diagnóstico
actualizado y aportar copia del PIAR, de la institución de donde
proviene.

4.3. MATRÍCULA
Artículo 22. La matrícula es el acto administrativo y académico mediante
el cual se formaliza el compromiso entre los padres de familia o
acudientes y el respectivo estudiante con la Institución y se legaliza la
vinculación inicial del aspirante admitido o la renovación anual de la
matrícula del estudiante antiguo. Mediante este compromiso, se
establecen las obligaciones entre las partes y se estipulan los derechos
– deberes; libertades – responsabilidades; garantías, obligaciones y
compromisos educativos y económicos.
Los requisitos de matrícula son los siguientes:
1. Fotocopia del documento de identidad (Tarjeta de Identidad -
Mayores de 7 Años, Menores - Registro Civil)
2. Copia recibo de pago seguro estudiantil vigente
3. Copia recibos de pago costos de matrícula cancelados en el
Banco.
4. Certificado médico
5. Tamizaje visual y auditivo (requisito para preescolar y hasta
grado 2o)
6. Paz y Salvo. (Para todos los Estudiantes)
7. Certificados de estudios años anteriores a partir de grado 5o para
bachillerato (Estudiantes Nuevos)
8. Último informe de calificaciones año anterior para primaria
(Estudiantes Nuevos)
9. Constancia de comportamiento (Estudiantes Nuevos)
10. Retiro del SIMAT (Estudiantes Nuevos)
11. Copia del carnet de salud o certificación de EPS vigente.
12. Certificado de vacunación expedido por la EPS (requisito para
preescolar y hasta grado 11o)

ANEXO 1. RUTA DE ATENCIÓN INTEGRAL PARA LA

CONVIVENCIA ESCOLAR

1.1. ASISTENCIA SALESIANA
El ambiente educativo salesiano está caracterizado por las relaciones
fraternas y cordiales entre los miembros de la Comunidad Educativa.
Los jóvenes deben sentirse acogidos con un adecuado y razonable nivel
de exigencia que hacen de nuestro colegio una familia.
Los educadores y todo el personal vinculado a nuestro colegio deben
caracterizarse por la vivencia del Sistema Preventivo de Don Bosco,
buscando siempre un mayor conocimiento y vivencia de la identidad
salesiana, dando protagonismo y responsabilidad a los estudiantes en
la vida del Colegio a fin de que se formen como líderes especialmente a
través del asociacionismo y los diferentes proyectos y actividades
pedagógicas complementarias tradicionales de la Institución.
La presencia - asistencia, se traduce en el esfuerzo de los educadores
por eliminar distancias, acoger fraternalmente a los jóvenes, crear un
ambiente educativo, estar presente en su vida, hacerse amar.
Esta característica se convierte en un estilo de animación que resalta
elementos centrales del Sistema Preventivo:
● Un estilo de presencia entre los jóvenes que privilegia las
relaciones interpersonales sobre las institucionales.
● Un acompañamiento que se preocupa, sobre todo, de
profundizar en las motivaciones de las orientaciones, más que
en lograr un simple cumplimiento.

● Una cercanía física, mental y afectiva con el otro.
● Un afecto manifestado en la opción por el desarrollo integral de
los jóvenes, para que logren un proyecto de vida positivo.
Artículo 1. Cualquier educador del colegio está llamado a hacer
observaciones formativas a los estudiantes, independientemente del
grado, en beneficio de su formación integral. Según la situación de
convivencia lo amerite, el educador debe remitir al estudiante a la
correspondiente Coordinación para hacer un adecuado seguimiento del
protocolo correspondiente. En emergencias, ubicar a las personas que
ofrecen la atención adecuada y prestar ayuda en caso necesario según
el caso.
Artículo 2. El Colegio Salesiano de Duitama asume los principios
establecidos en la Ley 1620 de 2013, con la cual se crea el Sistema
Nacional de Convivencia Escolar y Formación para el ejercicio de los
Derechos Humanos, la Educación para la Sexualidad y la Prevención y
Mitigación de la Violencia Escolar.
Con el fin de prevenir y/o atender situaciones que vulneren los derechos
del menor, el Colegio Salesiano de Duitama establece el Protocolo de
Atención y Prevención del Maltrato Infantil, el cual puede ser consultado
en Coordinación de Convivencia.

Acuerdos: Hace referencia a la puesta en común de ideas u objetos
entre personas implicadas en una situación.
Acción reparadora: Toda acción pedagógica que busca enmendar y
compensar daños causados a otras personas. Son acciones que
pretenden restablecer las relaciones interpersonales y sociales de
confianza y solidaridad en favor de un clima escolar fraterno, este tipo
de acciones son construidas colectivamente y pueden activarse para
atender conflictos manejados inadecuadamente.
Amonestación: Llamado de atención reflexivo que hacen directivas y
docentes de la institución a un/a estudiante, con el fin de que tome
consciencia de la inconveniencia de su comportamiento. Dicha acción
queda registrada en el Observador del estudiante.
Apelación: Recurso mediante el cual cualquier miembro de la
Comunidad Educativa solicita la revisión de una decisión por parte de
una instancia superior, teniendo en cuenta el conducto regular.
Bienestar estudiantil: Conjunto de acciones realizadas por la
Institución educativa en favor de la convivencia y el desarrollo pleno e
integral del estudiantado y en algunas ocasiones de sus familias. Estas
acciones pueden ser programas nacionales, regionales o propios de la
Institución.
Conflictos. Son situaciones que se caracterizan porque hay una
incompatibilidad real o percibida entre una o varias personas frente a
sus intereses.

El Colegio Salesiano de Duitama comprende el conflicto como un
proceso presente en las relaciones humanas, que sucede por diversidad
de percepciones en cuanto a intereses, necesidades y valores. Es una
oportunidad pedagógica porque ayuda a crecer, a proteger la vida y
posibilita construir mejores relaciones.
Conflictos Manejados Inadecuadamente. Son situaciones en las que
los conflictos no son resueltos de manera constructiva y dan lugar a
hechos que afectan la convivencia escolar, como altercados,
enfrentamientos o riñas entre dos o más miembros de la comunidad
educativa de los cuales por lo menos uno es estudiante y siempre y
cuando no exista una afectación al cuerpo o a la salud de cualquiera de
los involucrados.
Convivencia digital: Hace referencia al relacionamiento que establecen
las personas a través de la interacción con medios y entornos digitales.
Lo que hace necesario acordar una serie de parámetros (formalidades,
costumbres, reglas, netiquetas) que permiten la adecuada interacción
con la comunidad digital.
Convivencia escolar: Acción de vivir en compañía de otras personas
en el contexto escolar de manera pacífica y armónica. Es el conjunto de
relaciones que ocurren entre las personas que hacen parte de la
comunidad educativa, las cuales deben enfocarse en el logro de los
objetivos educativos y su desarrollo integral.
Compromiso escolar: Decisión libre, mediante la cual una persona
asume con responsabilidad las reglas, normas, actos y acciones para el
beneficio propio y común. El compromiso se escribe y firma en el

Agresión Escolar. Es toda acción realizada por uno o varios integrantes
de la comunidad educativa que busca afectar negativamente a otros
miembros de la misma, de los cuales por lo menos uno es estudiante.
La agresión escolar puede ser física, verbal, gestual, relacional y
electrónica.
a. Agresión Física. Es toda acción que tenga como finalidad
causar daño al cuerpo o a la salud de otra persona. Incluye
puñetazos, patadas, empujones, cachetadas, mordiscos,
rasguños, pellizcos, jalón de pelo, entre otras.
b. Agresión Verbal. Es toda acción que busque con las palabras
degradar, humillar, atemorizar, descalificar a otros. Incluye
insultos, apodos ofensivos, burlas y amenazas.

c. Agresión Gestual. Es toda acción que busque con los gestos
degradar, humillar, atemorizar o descalificara otros.
d. Agresión Relacional. Es toda acción que busque afectar
negativamente las relaciones que otros tienen. Incluye excluir de
grupos, aislar deliberadamente y difundir rumores o secretos
buscando afectar negativamente el estatus o imagen que tiene
la persona frente a otros.
e. Agresión Electrónica. Es toda acción que busque afectar
negativamente a otros a través de medios electrónicos. Incluye
la divulgación de fotos o videos íntimos o humillantes en
Internet, realizar comentarios insultantes u ofensivos sobre otros
a través de redes sociales y enviar correos electrónicos o
mensajes de texto insultantes u ofensivos, tanto de manera
anónima como cuando se revela la identidad de quien los envía.
Acoso Escolar (Bullying). De acuerdo con el artículo 2 de la Ley 1620
de 2013, es toda conducta negativa, intencional metódica y sistemática
de agresión, intimidación, humillación, ridiculización, difamación,
coacción, aislamiento deliberado, amenaza o incitación a la violencia o
cualquier forma de maltrato psicológico, verbal, físico o por medios
electrónicos contra un niño, niña o adolescente, por parte de un
estudiante o varios de sus pares con quienes mantiene una relación de
poder asimétrica, que se presenta de forma reiterada o a lo largo de un
tiempo determinado. También puede ocurrir por parte de docentes
contra estudiantes, o por parte de estudiantes contra docentes, ante la
indiferencia o complicidad de su entorno.

la Ley 1620 de 2013, es toda forma de intimidación con uso deliberado
de tecnologías de información (Internet, redes sociales virtuales,

garantizar la protección integral, el interés superior y el pleno y
armonioso desarrollo de los y las estudiantes, sobre quienes existe una
vulneración de derechos, así como alcanzar el restablecimiento de
estos.
Derecho: Condición del ser humano por la cual es tratado desde
principios de justicia y equidad para alcanzar una vida digna en
sociedad.
Derechos humanos sexuales y reproductivos (DHSR): Los Derechos
Sexuales y Derechos Reproductivos son Derechos Humanos y su
finalidad es garantizar que todas las personas puedan vivir libres de
discriminación, riesgos, amenazas, coerciones y violencia en el campo
de la sexualidad y la reproducción.

Discriminación: Trato diferente y perjudicial que se da a una persona
por motivos de raza, sexo, ideas políticas, religión, entre otras.
Diversidad: Característica innata del ser humano, determinada a partir
de la identidad y de las particularidades de las niñas, niños y
adolescentes. Rescata las potencialidades individuales en términos de
riqueza cultural, lingüística, económica y política, que se entrelazan en
el orden social.
Enfoque de derechos: Es el reconocimiento de los niños, niñas,
adolescente como sujetos de derechos y obligaciones propias de su
papel como actores sociales. Este enfoque es determinado para la
protección de las dimensiones del ser humano.
Enfoque de género: En el Colegio Salesiano de Duitama implica el
desaprendizaje de una serie de condicionamientos sociales que
permanentemente reafirman estereotipos de inequidad y asimetría en
las relaciones entre niñas y niños que reafirman a su vez ejercicios de
poder en tal sentido. Significa reaprender otras maneras de relacionarse,
que abandonen los estereotipos sexistas que la sociedad patriarcal (de
derecho y dominio masculino), de manera explícita o sutil ―y valiéndose
de diversos medios―, impone desde nuestra cultura.
Estímulo: En educación es un reconocimiento expreso o tácito que
anima el esfuerzo individual, sin crear discrepancias y conflictos entre el
estudiantado y que por el contrario ayuda a su crecimiento personal.
Estereotipos: Son aquellas ideas, prejuicios, creencias y opiniones
preconcebidas en un medio social que generan interpretaciones

Flamín: Es cuando una discusión que se lleva a cabo en línea (en
correos electrónicos, redes, blogs o foros) toma un tono insultante,
burlón o desagradable hacia una de las personas con el objetivo de

Grooming: es la acción por medio de la cual una persona con un perfil

de dispositivos de comunicación una relación engañosa con un niño,
niña o adolescente, con el propósito de conocerlo, ganar su confianza e

chantajearlos para tener encuentros personales y cometer el abuso

Inclusión: es un enfoque que responde positivamente a la diversidad
de las personas y a las diferencias individuales, entendiendo que la
diversidad no es un problema, sino una oportunidad para el
enriquecimiento de la sociedad a través de la activa participación en la
vida familiar, en la educación, en el trabajo y en general en todos los
procesos sociales, culturales y en las comunidades.
Interculturalidad: Es el reconocimiento y recuperación de las
tradiciones culturales de los adolescentes y jóvenes como parte de su
proceso de aprendizaje; la interculturalidad interviene en la inclusión
educativa mediante la interacción entre personas de culturas diversas,
en el marco del respeto a la diversidad.

Violencia Sexual. De acuerdo con lo establecido en el artículo 2 de la
Ley 1146 de 2007, "se entiende por violencia sexual contra niños, niñas
y adolescentes todo acto o comportamiento de tipo sexual ejercido sobre
un niño, niña o adolescente, utilizando la fuerza o cualquier forma de
coerción física, psicológica o emocional, aprovechando las condiciones
de indefensión, de desigualdad y las relaciones de poder existentes
entre víctima y agresor".
Vulneración de los Derechos de los niños, niñas y adolescentes:
Es toda situación de daño, lesión o perjuicio que impide el ejercicio pleno
de los derechos de los niños, niñas y adolescentes.
Xenofobia: Toda forma de rechazo, discriminación o maltrato hacia una
persona o grupo debido a su origen nacional, cultural, étnico o a
cualquier condición que lo haga percibirse como “extranjero”.
En el espíritu del carisma salesiano, esta conducta contradice los valores
del respeto, la solidaridad y la opción preferencial por los más
vulnerables. Por tanto, en la comunidad educativa salesiana no se
permiten expresiones, actitudes o acciones que afecten la dignidad de
cualquier persona por su lugar de procedencia, promoviendo siempre un
ambiente de acogida, fraternidad y reconocimiento de la diversidad.
5. Restablecimiento de los derechos de los niños, niñas y
adolescentes. Es el conjunto de actuaciones administrativas y de otra
naturaleza que se desarrollan para la restauración de su dignidad e
integridad como sujetos de derechos, y de su capacidad para disfrutar
efectivamente de los derechos que le han sido vulnerados.

1.4. ACCIONES PEDAGÓGICAS, CORRECTIVOS Y
PROTOCOLOS
Cuando se presente una situación que afecte la convivencia escolar y
ejercicio de los derechos humanos entre los integrantes de la
Comunidad Educativa, se buscará un acercamiento entre las partes
respetando el conducto regular, que es el mecanismo establecido por el
Colegio para dar trámite y resolver la situación dentro de los términos de
respeto, sinceridad y velando por los derechos de quien lo sigue,
asumiendo con responsabilidad las consecuencias de las decisiones
tomadas.
CONDUCTO REGULAR DE NORMALIZACIÓN Y CONVIVENCIA
Para efectos de definir criterios y aplicar correctivos pedagógicos, se
tendrá en cuanta el conducto regular descrito en los respectivos
procedimientos académicos, de convivencia y administrativos:
● Diálogo con el docente.
● Diálogo con el director de grupo.
● Diálogo con la coordinación académica o de convivencia según
el caso.
● Diálogo en rectoría.

Artículo 6. Los protocolos son los procedimientos establecidos por el
Colegio, necesarios para tratar las situaciones que se presentan dentro
de la institución que afectan la convivencia, con el fin de manejarlos
formativamente entre el estudiante, su familia y el colegio.
Ante el conocimiento de aquellas actuaciones que afectan
negativamente la convivencia en el Colegio, entorpeciendo la labor
formativa, en primera instancia se debe reconocer la situación o hecho
desde las narraciones de las personas involucradas, identificar qué tipo
de situación se presenta para decidir qué protocolo y acciones
implementar.
El Colegio determina los siguientes PROTOCOLOS:
para las Situaciones Tipo I:
El establecimiento y aplicación de las acciones pedagógicas y
correctivos de las situaciones Tipo I, corresponden en primera instancia
al Educador conocedor de la situación, quien podrá aplicar las
siguientes acciones pedagógicas y correctivos de acuerdo con la
situación presentada:
1. Diálogo reflexivo con las partes involucradas en el conflicto.
2. Búsqueda de estrategias para reparar los daños causados,
restablecer los derechos e iniciar una reconciliación.
3. Registro en el Observador del Estudiante, dejando constancia
de lo sucedido.

4. Seguimiento al caso o a las acciones pedagógicas
Según la situación presentada, el Educador debe asegurarse de:
• Mediar de manera pedagógica con las personas involucradas, a
partir de exponer sus puntos de vista y buscando reparar el daño
causado.
• Establecer formas de solución de manera imparcial y
equitativa, buscando la reparación de los daños causados, el
restablecimiento de derechos y la reconciliación.
• Activar acciones pedagógicas como el diálogo, la mediación, el
trabajo colaborativo y los pactos de aula, entre otros.
• Asignar trabajos, campañas formativas en dirección de grupo,
mensajes de buenos días referentes a la falta cometida.
• Establecer compromisos y hacer seguimiento.
En la medida en que exista reincidencia, se seguirá el protocolo para
este tipo de situaciones (Tipo II).
PROTOCOLO Para las Situaciones Tipo II:
En el caso de que la situación se identifique como tipo II, se podrán
seguir las siguientes acciones:
1. Las personas involucradas deben informar la situación a director de
grupo y coordinación de convivencia.
2. Dejar narración de sucesos escritos sobre la situación presentada.
3. Citación e información a padres de familia por parte del director de
grupo o coordinador de convivencia según el caso.
4. Registro en el Observador del Estudiante.

formativa, buscando siempre el crecimiento personal y la reconciliación.
La Coordinación de Convivencia realizará la citación a los padres de
familia, el debido registro de las actuaciones y el seguimiento de las
estrategias pedagógicas implementadas, según lo requiera la situación.
La Psico orientadora y la Coordinación de Convivencia deberán
asegurar el acompañamiento integral, garantizando el respeto por la
dignidad de todos los miembros de la comunidad educativa y
promoviendo ambientes de sana convivencia asegurándose de:

• Brindar atención inmediata en salud física y mental a las
personas involucradas.
● Remitir la situación a las autoridades administrativas, cuando se
requieran medidas de restablecimiento de derechos.
● Adoptar medidas de protección para las personas involucradas
para evitar posibles acciones en su contra.
● Informar de manera inmediata a las familias de los estudiantes
involucrados.
● Generar espacios para que las personas involucradas puedan
exponer lo acontecido en compañía de su familia. Siempre y
cuando se preserve el derecho a la intimidad y confidencialidad.
● Determinar las acciones restaurativas para reparar los daños
causados, el restablecimiento de derechos y la reconciliación.
● Informar al Comité Convivencia Escolar, quien hará seguimiento
de las acciones tomadas frente a la situación.
● Reportar el caso a través del Sistema de Información Unificado
de Convivencia Escolar.
Para las demás situaciones (numerales 1, 2 y 3) le corresponderán al
educador que tiene conocimiento o que ha realizado el seguimiento a
las situaciones.
Para las situaciones de incumplimiento de Acta de compromiso
convivencial corresponderá a la Coordinación correspondiente, quien es
el directo responsable de realizar la citación a los padres de familia y el
registro, junto con el acompañamiento y seguimiento de las estrategias
generadas.

PRESENCIA: Todos tiene derecho a acceder a la información, espacios,

tomar decisiones en los aspectos claves que le competen.
PROGRESO: todos con iguales oportunidades para aprender y avanzar
en relación consigo mismo, a su ritmo.

4.1 RUTA DE CATEDRA DE INTELIGENCIA EMOCIONAL
La Cátedra de Inteligencia Emocional, inspirada en el Sistema
Preventivo de Don Bosco, busca educar el corazón y fortalecer la
convivencia desde la razón, la amabilidad y la cercanía. Su propósito es
acompañar a los estudiantes en el desarrollo de habilidades
socioemocionales que favorecen un ambiente fraterno, alegre y
respetuoso.
Se estructura en cinco competencias esenciales:
Autoconocimiento: Reconocer emociones, fortalezas y límites para
crecer con identidad y autoestima.

El Colegio Salesiano de Duitama es una Comunidad Educativo
Pastoral privada y católica, que educa y evangeliza a través de la
educación formal en los niveles de preescolar, básica y media
técnica, a niños, niñas, adolescentes y jóvenes, formándolos
integralmente como buenos cristianos y honestos ciudadanos,
enmarcados en el Ecosistema Educativo Salesiano, para ser
agentes de transformación en su ambiente.

innovación educativa, la investigación, la
formación técnica y el aprendizaje colaborativo e

                    <div class="justice-bar">
                        <div class="bar-justa" style="width: ${porcentajeJusta}%;">
                            ${porcentajeJusta > 10 ? porcentajeJusta + '%' : ''}
                        </div>
                        <div class="bar-injusta" style="width: ${porcentajeInjusta}%;">
                            ${porcentajeInjusta > 10 ? porcentajeInjusta + '%' : ''}
                        </div>
                    </div>
                    <div class="bar-labels">
                        <span class="bar-label-justa">✅ ${justaCases} Justas</span>
                        <span class="bar-label-injusta">❌ ${injustaCases} Injustas</span>
                    </div>
                </div>

                <div class="rights-violation-section">
                    <div class="rights-violation-title">⚠️ DERECHOS MÁS VIOLADOS</div>
                    <div class="rights-list">
                        ${sortedViolations.length > 0 ? sortedViolations.map(([right, count]) => `
                            <div class="right-item">
                                <div class="right-name">${right}</div>
                                <div class="right-count">${count}</div>
                            </div>
                        `).join('') : '<div class="no-data">No se han registrado violaciones</div>'}
                    </div>
                </div>
            `;

            document.getElementById('statsGrid').innerHTML = html;
        }

        // ==========================================
        // AGREGAR CASO AL HISTORIAL
        // ==========================================
        function addCase(fault, sanction, verdict, violations) {
            const newCase = {
                id: Date.now(),
                fecha: new Date().toLocaleDateString('es-ES'),
                falta: fault,
                sancion: sanction,
                veredicto: verdict
            };
            caseHistory.unshift(newCase);
            
            violations.forEach(violation => {
                if (violationTracker.hasOwnProperty(violation)) {
                    violationTracker[violation]++;
                }
            });
            
            saveCases();
            updateStatistics();
        }

        // ==========================================
        // FUNCIÓN PRINCIPAL: ANALIZAR CON IA
        // ==========================================
        async function analizarConIA(tipoSancion, versionProfesor, versionEstudiante) {
            // Validar API Key
            if (GEMINI_API_KEY === "PEGAR_MI_KEY_AQUI" || !GEMINI_API_KEY) {
                mostrarError("❌ Error: Debes agregar tu API key de Google Gemini en el código. Ve a la línea que dice 'const GEMINI_API_KEY' y reemplaza 'PEGAR_MI_KEY_AQUI' con tu clave real.");
                return;
            }

            // Mostrar cargando
            mostrarCargando();

            // Construir el prompt
            const prompt = `Eres un abogado estudiantil experto en derechos de los estudiantes y en derecho administrativo. Analiza el siguiente caso de sanción escolar con rigor legal.

MANUAL DE CONVIVENCIA DEL COLEGIO:
${manualConvivencia}

CASO A ANALIZAR:
- Tipo de sanción recibida: ${tipoSancion}
- Versión del profesor: ${versionProfesor}
- Versión del estudiante: ${versionEstudiante}

Por favor, proporciona un análisis detallado que incluya:

1) **ARTÍCULOS APLICABLES**: ¿Qué artículos del manual de convivencia aplican a este caso? Cita específicamente cada uno.

2) **PROPORCIONALIDAD**: ¿Es la sanción proporcional a la falta cometida? Explica por qué sí o por qué no.

3) **DEBIDO PROCESO**: ¿Se respetó el debido proceso? Considera: ¿fue escuchado el estudiante? ¿se le informó a los acudientes si era necesario?

4) **VEREDICTO FINAL**: Basándote en tu análisis, ¿consideras que la sanción es JUSTA o INJUSTA? Sé claro y directo en tu conclusión.

5) **RECOMENDACIONES**: ¿Qué acciones concretas puede tomar el estudiante? Si la sanción fue injusta, ¿cómo puede apelar?

Proporciona un análisis profesional, imparcial y fundamentado en los derechos estudiantiles.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    const errorMsg = errorData.error?.message || 'Error desconocido en la API';
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const analisisIA = data.contents[0].parts[0].text;

                // Procesar resultado
                procesarResultadoIA(analisisIA, versionProfesor, versionEstudiante, tipoSancion);

            } catch (error) {
                console.error('Error:', error);
                mostrarError(`❌ Error al conectar con la IA: ${error.message}`);
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        // ==========================================
        // PROCESAR RESULTADO DE LA IA
        // ==========================================
        function procesarResultadoIA(analisisIA, versionProfesor, versionEstudiante, tipoSancion) {
            // Determinar si fue justa o injusta
            const textoLower = analisisIA.toLowerCase();
            const esInjusta = textoLower.includes('injusta');
            const esJusta = textoLower.includes('justa') && !esInjusta;

            // Determinar color del semáforo
            let colorSemaforo = 'green';
            let iconoSemaforo = '🟢';
            let tituloVeredicto = 'SANCIÓN JUSTA ✅';
            
            if (esInjusta) {
                colorSemaforo = 'red';
                iconoSemaforo = '🔴';
                tituloVeredicto = 'SANCIÓN INJUSTA ❌';
            } else if (textoLower.includes('desproporcionada')) {
                colorSemaforo = 'yellow';
                iconoSemaforo = '🟡';
                tituloVeredicto = 'SANCIÓN DESPROPORCIONADA ⚠️';
            }

            // Construir HTML
            let html = `
                <div class="semaphore ${colorSemaforo}">
                    <div class="semaphore-icon">${iconoSemaforo}</div>
                    <div class="semaphore-title">${tituloVeredicto}</div>
                    <div class="semaphore-description">Análisis realizado por Inteligencia Artificial (Google Gemini 2.0)</div>
                </div>

                <div class="analysis-content">
                    ${formatearAnalisisIA(analisisIA)}
                </div>
            `;

            // Mostrar resultado
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');

            // Guardar en historial
            const verdictType = esInjusta ? 'injusta' : 'justa';
            const sanctionName = {
                observation: 'Anotación en observador',
                citation: 'Citación a acudientes',
                suspension: 'Suspensión',
                other: 'Otra sanción'
            }[tipoSancion];

            addCase(versionProfesor, sanctionName, verdictType, []);

            // Desplazarse al análisis
            setTimeout(() => {
                document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            // Habilitar botón
            document.getElementById('analyzeBtn').disabled = false;
        }

        // ==========================================
        // FORMATEAR TEXTO DE LA IA
        // ==========================================
        function formatearAnalisisIA(texto) {
            let formateado = texto
                // Convertir **texto** a <strong>
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                // Convertir ### a <h2>
                .replace(/###\s+(.+)/g, '<h2>$1</h2>')
                // Convertir ## a <h2>
                .replace(/##\s+(.+)/g, '<h2>$1</h2>')
                // Convertir # a <h2>
                .replace(/#\s+(.+)/g, '<h2>$1</h2>')
                // Convertir saltos de línea dobles a párrafos
                .replace(/\n\n+/g, '</p><p>')
                // Convertir listas numeradas
                .replace(/^\d+\)\s+/gm, '<br>$&')
                // Convertir guiones a viñetas
                .replace(/^-\s+/gm, '<br>• ');
            
            return '<p>' + formateado + '</p>';
        }

        // ==========================================
        // MOSTRAR CARGANDO
        // ==========================================
        function mostrarCargando() {
            const html = `
                <div class="loading-container">
                    <div class="loading-text">
                        ⚖️ La IA está analizando tu caso...
                    </div>
                    <div class="loading-spinner"></div>
                    <p style="color: #E6C200; margin-top: 20px; font-size: 0.95em;">
                        Esto puede tomar de 5 a 15 segundos. Por favor, espera...
                    </p>
                </div>
            `;
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');
            document.getElementById('analyzeBtn').disabled = true;
        }

        // ==========================================
        // MOSTRAR ERROR
        // ==========================================
        function mostrarError(mensaje) {
            const html = `
                <div class="error-message">
                    ${mensaje}
                </div>
            `;
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');
            document.getElementById('analyzeBtn').disabled = false;
        }

        // ==========================================
        // EVENTOS DEL FORMULARIO
        // ==========================================
        const form = document.getElementById('sanctionForm');
        const clearBtn = document.getElementById('clearBtn');

        // Cargar casos al iniciar
        loadCases();

        // Envío del formulario
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const sanctionType = document.getElementById('sanctionType').value;
            const professorVersion = document.getElementById('professorVersion').value;
            const yourVersion = document.getElementById('yourVersion').value;

            // Llamar a la IA
            await analizarConIA(sanctionType, professorVersion, yourVersion);
        });

        // Limpiar análisis
        clearBtn.addEventListener('click', function() {
            form.reset();
            document.getElementById('analysisSection').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
