<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Tu sanción fue justa?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #FFD700;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Encabezado estilo tribunal */
        header {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            border: 3px solid #FFD700;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #E6C200;
            font-style: italic;
            font-weight: 300;
        }

        /* Contenedor principal */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(45, 45, 45, 0.9);
            border: 2px solid #FFD700;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* PANEL DE ESTADÍSTICAS */
        .statistics-panel {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .stats-title {
            color: #FFD700;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #2d2d2d;
            border: 1px solid #FFD700;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #E6C200;
            font-size: 0.95em;
            font-weight: normal;
        }

        /* Barra de progreso de justicia */
        .justice-bar-container {
            margin-top: 25px;
        }

        .justice-bar-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .justice-bar {
            height: 35px;
            background: #1a1a1a;
            border: 2px solid #FFD700;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            margin-bottom: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .bar-justa {
            background: linear-gradient(90deg, #22C55E, #16A34A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-injusta {
            background: linear-gradient(90deg, #EF4444, #DC2626);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #E6C200;
        }

        .bar-label-justa {
            color: #22C55E;
            font-weight: bold;
        }

        .bar-label-injusta {
            color: #EF4444;
            font-weight: bold;
        }

        /* Derechos más violados */
        .rights-violation-section {
            margin-top: 25px;
        }

        .rights-violation-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .rights-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-item {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right-name {
            color: #E6C200;
            flex: 1;
        }

        .right-count {
            background: #8B0000;
            color: #FFD700;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .no-data {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 15px;
        }

        .stat-card.no-cases {
            grid-column: 1 / -1;
        }

        /* Formulario */
        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: bold;
            font-size: 1.1em;
        }

        select,
        textarea,
        input[type="radio"] {
            padding: 10px;
            border: 2px solid #FFD700;
            background-color: #1a1a1a;
            color: #FFD700;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1em;
        }

        select {
            width: 100%;
            cursor: pointer;
        }

        select option {
            background-color: #1a1a1a;
            color: #FFD700;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        /* Opciones de radio */
        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-group label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            font-weight: normal;
            gap: 10px;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        /* Botón */
        button {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            color: #FFD700;
            padding: 15px 40px;
            border: 2px solid #FFD700;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            padding: 10px 20px;
            font-size: 0.9em;
            width: auto;
            margin-top: 10px;
        }

        /* Área de análisis */
        .analysis-section {
            margin-top: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 30px;
            display: none;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .analysis-section.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Semáforo */
        .semaphore {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            border-radius: 10px;
        }

        .semaphore-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .semaphore.green {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22C55E;
        }

        .semaphore.green .semaphore-icon {
            color: #22C55E;
        }

        .semaphore.green .semaphore-title {
            color: #22C55E;
        }

        .semaphore.yellow {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #EAB308;
        }

        .semaphore.yellow .semaphore-icon {
            color: #EAB308;
        }

        .semaphore.yellow .semaphore-title {
            color: #EAB308;
        }

        .semaphore.red {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #EF4444;
        }

        .semaphore.red .semaphore-icon {
            color: #EF4444;
        }

        .semaphore.red .semaphore-title {
            color: #EF4444;
        }

        .semaphore-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .semaphore-description {
            color: #E6C200;
            font-size: 1.1em;
        }

        /* Secciones del análisis */
        .analysis-section-title {
            color: #FFD700;
            font-size: 1.3em;
            margin-top: 25px;
            margin-bottom: 15px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .analysis-section-title:first-child {
            margin-top: 0;
        }

        .check-item {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin: 12px 0;
            border-radius: 5px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .check-item.success {
            border-left-color: #22C55E;
            background: rgba(34, 197, 94, 0.1);
        }

        .check-item.success .icon {
            color: #22C55E;
        }

        .check-item.warning {
            border-left-color: #EAB308;
            background: rgba(234, 179, 8, 0.1);
        }

        .check-item.warning .icon {
            color: #EAB308;
        }

        .check-item.error {
            border-left-color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .check-item.error .icon {
            color: #EF4444;
        }

        .icon {
            font-size: 1.5em;
            min-width: 30px;
            text-align: center;
            margin-top: 2px;
        }

        .check-content {
            flex: 1;
        }

        .check-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .check-description {
            color: #E6C200;
            font-size: 0.95em;
            line-height: 1.5;
        }

        /* Lista de artículos */
        .articles-list {
            background: #2d2d2d;
            border: 1px solid #FFD700;
            padding: 15px;
            border-radius: 5px;
            margin: 12px 0;
        }

        .article-item {
            color: #E6C200;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .article-item:before {
            content: "⚖️";
            position: absolute;
            left: 0;
        }

        .article-item strong {
            color: #FFD700;
        }

        /* Recomendaciones */
        .recommendation-box {
            background: #8B0000;
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
        }

        .recommendation-box .rec-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .recommendation-box .rec-item {
            color: #E6C200;
            margin: 8px 0;
            padding-left: 25px;
            position: relative;
        }

        .recommendation-box .rec-item:before {
            content: "→";
            position: absolute;
            left: 5px;
            color: #FFD700;
            font-weight: bold;
        }

        /* SECCIÓN DE CASOS SIMILARES */
        .similar-cases-section {
            background: #8B0000;
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .similar-cases-title {
            color: #FFD700;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .similar-case-card {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin: 12px 0;
            border-radius: 5px;
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .case-date {
            color: #E6C200;
            font-size: 0.9em;
            font-style: italic;
        }

        .case-verdict {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .case-verdict.justa {
            background: rgba(34, 197, 94, 0.3);
            color: #22C55E;
            border: 1px solid #22C55E;
        }

        .case-verdict.injusta {
            background: rgba(239, 68, 68, 0.3);
            color: #EF4444;
            border: 1px solid #EF4444;
        }

        .case-fault {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .case-sanction {
            color: #E6C200;
            margin-bottom: 8px;
        }

        .no-cases {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .similarity-score {
            color: #FFD700;
            font-size: 0.9em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #FFD700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .container {
                padding: 20px;
                border: 2px solid #FFD700;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: column;
                gap: 15px;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }

            .semaphore-icon {
                font-size: 3em;
            }

            .semaphore-title {
                font-size: 1.4em;
            }

            .case-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 30px 15px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .container {
                padding: 15px;
            }

            label {
                font-size: 1em;
            }

            .analysis-section {
                padding: 20px;
            }

            .semaphore-icon {
                font-size: 2.5em;
            }

            .semaphore-title {
                font-size: 1.2em;
            }

            .analysis-section-title {
                font-size: 1.1em;
            }

            .stats-title {
                font-size: 1.2em;
            }

            .stat-number {
                font-size: 2em;
            }

            .justice-bar-title {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚖️ ¿TU SANCIÓN FUE JUSTA? ⚖️</h1>
        <p class="subtitle">Analiza si la sanción que recibiste cumple con el manual de convivencia</p>
    </header>

    <div class="container">
        <!-- PANEL DE ESTADÍSTICAS -->
        <div class="statistics-panel" id="statisticsPanel">
            <div class="stats-title">📊 ESTADÍSTICAS GENERALES</div>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card no-cases">
                    <div class="no-data">Aún no hay casos analizados. ¡Sé el primero en analizar tu sanción!</div>
                </div>
            </div>
        </div>

        <form id="sanctionForm" class="form-section">
            <!-- Tipo de sanción -->
            <div class="form-group">
                <label for="sanctionType">1. ¿Qué sanción recibiste?</label>
                <select id="sanctionType" required>
                    <option value="">-- Selecciona una opción --</option>
                    <option value="observation">Anotación en observador</option>
                    <option value="citation">Citación a acudientes</option>
                    <option value="suspension">Suspensión</option>
                    <option value="other">Otra</option>
                </select>
            </div>

            <!-- Versión del profesor -->
            <div class="form-group">
                <label for="professorVersion">2. ¿Qué hiciste según el profesor?</label>
                <textarea id="professorVersion" placeholder="Escribe lo que el profesor dice que hiciste..." required></textarea>
            </div>

            <!-- Tu versión -->
            <div class="form-group">
                <label for="yourVersion">3. Tu versión de los hechos</label>
                <textarea id="yourVersion" placeholder="Cuéntanos qué pasó según tú..." required></textarea>
            </div>

            <!-- Te escucharon -->
            <div class="form-group">
                <label>4. ¿Te escucharon antes de aplicar la sanción?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="listened" value="yes" required>
                        Sí
                    </label>
                    <label>
                        <input type="radio" name="listened" value="no" required>
                        No
                    </label>
                </div>
            </div>

            <!-- Te informaron a tus acudientes -->
            <div class="form-group">
                <label>5. ¿Te informaron o informaron a tus acudientes de la sanción?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="informed" value="yes" required>
                        Sí
                    </label>
                    <label>
                        <input type="radio" name="informed" value="no" required>
                        No
                    </label>
                </div>
            </div>

            <!-- Botón -->
            <button type="submit">ANALIZAR SANCIÓN</button>
        </form>

        <!-- Área de análisis -->
        <div class="analysis-section" id="analysisSection">
            <div id="analysisContent"></div>
            <button class="btn-clear" id="clearBtn">Limpiar</button>
        </div>
    </div>

    <script>
        // MANUAL DE CONVIVENCIA - Reemplazar con el manual real del colegio
        const manualConvivencia = `CAPÍTULO 1 - DERECHOS DEL ESTUDIANTE
1. Todo estudiante tiene derecho a ser escuchado antes de cualquier sanción.
2. Los objetos decomisados deben ser devueltos al finalizar la jornada escolar.
3. Ningún estudiante puede ser expulsado de clase sin una razón documentada.
4. El estudiante tiene derecho a conocer las pruebas en su contra.
5. Las sanciones deben ser proporcionales a la falta.
6. El estudiante tiene derecho a presentar descargos.

CAPÍTULO 2 - PROCESO DISCIPLINARIO
1. Ante una falta, el profesor debe dialogar primero con el estudiante.
2. Se debe dejar constancia escrita de la falta y la versión del estudiante.
3. La sanción debe corresponder al tipo de falta (leve, grave, muy grave).
4. El acudiente debe ser informado en caso de faltas graves.
5. El estudiante puede apelar cualquier sanción ante el comité de convivencia.

CAPÍTULO 3 - FALTAS Y SANCIONES
Falta leve: Llamado de atención verbal. No genera anotación.
Falta grave: Anotación en el observador. Citación a acudientes.
Falta muy grave: Suspensión temporal. Matrícula condicional.`;

        // BASE DE DATOS DE CASOS - Se guarda en localStorage
        let caseHistory = [];

        // Objeto para rastrear violaciones de derechos
        let violationTracker = {
            'No fue escuchado': 0,
            'No se informó a acudientes': 0,
            'Sanción desproporcionada': 0,
            'Falta debido proceso': 0
        };

        // Cargar casos del localStorage al iniciar
        function loadCases() {
            const stored = localStorage.getItem('caseHistory');
            const violationStored = localStorage.getItem('violationTracker');
            
            if (stored) {
                caseHistory = JSON.parse(stored);
            }
            if (violationStored) {
                violationTracker = JSON.parse(violationStored);
            }
            
            updateStatistics();
        }

        // Guardar casos en localStorage
        function saveCases() {
            localStorage.setItem('caseHistory', JSON.stringify(caseHistory));
            localStorage.setItem('violationTracker', JSON.stringify(violationTracker));
        }

        // Actualizar panel de estadísticas
        function updateStatistics() {
            const totalCases = caseHistory.length;
            
            if (totalCases === 0) {
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card no-cases">
                        <div class="no-data">Aún no hay casos analizados. ¡Sé el primero en analizar tu sanción!</div>
                    </div>
                `;
                return;
            }

            // Calcular justas vs injustas
            const justaCases = caseHistory.filter(c => c.veredicto === 'justa').length;
            const injustaCases = caseHistory.filter(c => c.veredicto === 'injusta').length;
            const porcentajeJusta = Math.round((justaCases / totalCases) * 100);
            const porcentajeInjusta = 100 - porcentajeJusta;

            // Encontrar derechos más violados
            const sortedViolations = Object.entries(violationTracker)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            // Construir HTML
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${totalCases}</div>
                        <div class="stat-label">Casos Analizados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: ${porcentajeJusta >= 50 ? '#22C55E' : '#EF4444'};">${porcentajeJusta}%</div>
                        <div class="stat-label">Sanciones Justas</div>
                    </div>
                </div>

                <div class="justice-bar-container">
                    <div class="justice-bar-title">⚖️ DISTRIBUCIÓN: JUSTAS vs INJUSTAS</div>
                    <div class="justice-bar">
                        <div class="bar-justa" style="width: ${porcentajeJusta}%;">
                            ${porcentajeJusta > 10 ? porcentajeJusta + '%' : ''}
                        </div>
                        <div class="bar-injusta" style="width: ${porcentajeInjusta}%;">
                            ${porcentajeInjusta > 10 ? porcentajeInjusta + '%' : ''}
                        </div>
                    </div>
                    <div class="bar-labels">
                        <span class="bar-label-justa">✅ ${justaCases} Justas</span>
                        <span class="bar-label-injusta">❌ ${injustaCases} Injustas</span>
                    </div>
                </div>

                <div class="rights-violation-section">
                    <div class="rights-violation-title">⚠️ DERECHOS MÁS VIOLADOS</div>
                    <div class="rights-list">
                        ${sortedViolations.length > 0 ? sortedViolations.map(([right, count]) => `
                            <div class="right-item">
                                <div class="right-name">${right}</div>
                                <div class="right-count">${count}</div>
                            </div>
                        `).join('') : '<div class="no-data">No se han registrado violaciones</div>'}
                    </div>
                </div>
            `;

            document.getElementById('statsGrid').innerHTML = html;
        }

        // Agregar un nuevo caso
        function addCase(fault, sanction, verdict, violations) {
            const newCase = {
                id: Date.now(),
                fecha: new Date().toLocaleDateString('es-ES'),
                falta: fault,
                sancion: sanction,
                veredicto: verdict
            };
            caseHistory.unshift(newCase);
            
            // Registrar violaciones
            violations.forEach(violation => {
                if (violationTracker.hasOwnProperty(violation)) {
                    violationTracker[violation]++;
                }
            });
            
            saveCases();
            updateStatistics();
        }

        // Calcular similitud entre dos textos (algoritmo simple)
        function calculateSimilarity(text1, text2) {
            const words1 = text1.toLowerCase().split(/\s+/);
            const words2 = text2.toLowerCase().split(/\s+/);
            
            let matches = 0;
            words1.forEach(word => {
                if (words2.some(w => w.includes(word) || word.includes(w))) {
                    matches++;
                }
            });

            const similarity = (matches / Math.max(words1.length, words2.length)) * 100;
            return Math.round(similarity);
        }

        // Encontrar casos similares
        function findSimilarCases(fault, sanction) {
            return caseHistory
                .map(caseItem => ({
                    ...caseItem,
                    similarity: Math.round(
                        (calculateSimilarity(fault, caseItem.falta) + 
                         calculateSimilarity(sanction, caseItem.sancion)) / 2
                    )
                }))
                .filter(c => c.similarity >= 30)
                .sort((a, b) => b.similarity - a.similarity)
                .slice(0, 5);
        }

        // Generar HTML de casos similares
        function generateSimilarCasesHTML(fault, sanction) {
            const similarCases = findSimilarCases(fault, sanction);

            if (similarCases.length === 0) {
                return '<div class="similar-cases-section"><div class="similar-cases-title">📋 CASOS ANTERIORES SIMILARES</div><div class="no-cases">No hay casos similares registrados anteriormente.</div></div>';
            }

            let html = '<div class="similar-cases-section"><div class="similar-cases-title">📋 CASOS ANTERIORES SIMILARES</div>';

            similarCases.forEach(caseItem => {
                const verdictClass = caseItem.veredicto === 'justa' ? 'justa' : 'injusta';
                const verdictText = caseItem.veredicto === 'justa' ? '✅ JUSTA' : '❌ INJUSTA';
                const verdictIcon = caseItem.veredicto === 'justa' ? '🟢' : '🔴';

                html += `<div class="similar-case-card">
                    <div class="case-header">
                        <div class="case-date">📅 ${caseItem.fecha}</div>
                        <span class="case-verdict ${verdictClass}">${verdictIcon} ${verdictText}</span>
                    </div>
                    <div class="case-fault"><strong>Falta:</strong> ${caseItem.falta.substring(0, 100)}...</div>
                    <div class="case-sanction"><strong>Sanción:</strong> ${caseItem.sancion}</div>
                    <div class="similarity-score">⭐ Similitud: ${caseItem.similarity}%</div>
                </div>`;
            });

            html += '</div>';
            return html;
        }

        const form = document.getElementById('sanctionForm');
        const analysisSection = document.getElementById('analysisSection');
        const analysisContent = document.getElementById('analysisContent');
        const clearBtn = document.getElementById('clearBtn');

        // Cargar casos al iniciar
        loadCases();

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const sanctionType = document.getElementById('sanctionType').value;
            const professorVersion = document.getElementById('professorVersion').value;
            const yourVersion = document.getElementById('yourVersion').value;
            const listened = document.querySelector('input[name="listened"]:checked').value;
            const informed = document.querySelector('input[name="informed"]:checked').value;

            // Generar análisis y rastrear violaciones
            let verdict = generateAnalysis(sanctionType, professorVersion, yourVersion, listened, informed);
            
            // Determinar si fue justa o injusta y qué violaciones hubo
            const verdictType = verdict.includes('SE VIOLARON TUS DERECHOS') ? 'injusta' : 'justa';
            const violations = [];

            if (listened === 'no') violations.push('No fue escuchado');
            if (informed === 'no') violations.push('No se informó a acudientes');

            // Agregar a historial
            const sanctionName = {
                observation: 'Anotación en observador',
                citation: 'Citación a acudientes',
                suspension: 'Suspensión',
                other: 'Otra sanción'
            }[sanctionType];

            addCase(professorVersion, sanctionName, verdictType, violations);

            // Mostrar casos similares
            const similarCasesHTML = generateSimilarCasesHTML(professorVersion, sanctionName);

            analysisContent.innerHTML = verdict + similarCasesHTML;
            analysisSection.classList.add('active');

            // Desplazarse al análisis
            setTimeout(() => {
                analysisSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        });

        // Limpiar análisis
        clearBtn.addEventListener('click', function() {
            form.reset();
            analysisSection.classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        function generateAnalysis(sanctionType, professorVersion, yourVersion, listened, informed) {
            let html = '';

            // Determinar severidad de la sanción
            const sanctionData = {
                observation: { name: 'Anotación en observador', level: 'leve' },
                citation: { name: 'Citación a acudientes', level: 'grave' },
                suspension: { name: 'Suspensión', level: 'muy_grave' },
                other: { name: 'Otra sanción', level: 'desconocida' }
            };

            const sanction = sanctionData[sanctionType];

            // Evaluar due process (debido proceso)
            let processViolations = [];
            let verdictColor = 'green';
            let verdictTitle = 'SANCIÓN JUSTA ✅';
            let verdictDescription = 'Se siguió el debido proceso y la sanción es proporcional.';

            // Verificar derechos del estudiante
            if (listened === 'no') {
                processViolations.push('No fue escuchado antes de la sanción');
                verdictColor = 'red';
                verdictTitle = 'SE VIOLARON TUS DERECHOS ❌';
                verdictDescription = 'La sanción fue aplicada sin respetar tu derecho a ser escuchado.';
            }

            if (informed === 'no' && (sanction.level === 'grave' || sanction.level === 'muy_grave')) {
                processViolations.push('No se informó a los acudientes (falta grave/muy grave)');
                verdictColor = 'red';
                verdictTitle = 'SE VIOLARON TUS DERECHOS ❌';
                verdictDescription = 'Para faltas graves, los acudientes deben ser informados.';
            }

            // SEMÁFORO
            html += `<div class="semaphore ${verdictColor}">
                <div class="semaphore-icon">${getSemaphoreIcon(verdictColor)}</div>
                <div class="semaphore-title">${verdictTitle}</div>
                <div class="semaphore-description">${verdictDescription}</div>
            </div>`;

            // ANÁLISIS DEL DEBIDO PROCESO
            html += '<div class="analysis-section-title">⚖️ VERIFICACIÓN DEL DEBIDO PROCESO</div>';

            // Check 1: Derecho a ser escuchado
            const listenedStatus = listened === 'yes' ? 'success' : 'error';
            const listenedIcon = listened === 'yes' ? '✅' : '❌';
            const listenedTitle = listened === 'yes' ? 'Fuiste escuchado' : 'No fuiste escuchado';
            const listenedDesc = listened === 'yes' 
                ? 'Se respetó tu derecho a presentar tu versión de los hechos (Art. 1, Cap. 1)'
                : 'VIOLACIÓN DE DERECHO: Todo estudiante tiene derecho a ser escuchado antes de cualquier sanción (Art. 1, Cap. 1)';

            html += `<div class="check-item ${listenedStatus}">
                <div class="icon">${listenedIcon}</div>
                <div class="check-content">
                    <div class="check-title">${listenedTitle}</div>
                    <div class="check-description">${listenedDesc}</div>
                </div>
            </div>`;

            // Check 2: Información a acudientes
            const informedStatus = informed === 'yes' || sanction.level === 'leve' ? 'success' : 'error';
            const informedIcon = informed === 'yes' || sanction.level === 'leve' ? '✅' : '❌';
            const informedTitle = informed === 'yes' ? 'Se informó a acudientes' : 'No se informó a acudientes';
            const informedDesc = informed === 'yes' || sanction.level === 'leve'
                ? 'Se cumplió el protocolo de información a acudientes (Art. 4, Cap. 2)'
                : 'ALERTA: Para faltas graves y muy graves, los acudientes deben ser informados (Art. 4, Cap. 2)';

            if (sanction.level !== 'leve') {
                html += `<div class="check-item ${informedStatus}">
                    <div class="icon">${informedIcon}</div>
                    <div class="check-content">
                        <div class="check-title">${informedTitle}</div>
                        <div class="check-description">${informedDesc}</div>
                    </div>
                </div>`;
            }

            // ANÁLISIS DE LA SANCIÓN
            html += '<div class="analysis-section-title">📋 ANÁLISIS DE LA SANCIÓN</div>';

            html += `<div class="check-item">
                <div class="icon">📌</div>
                <div class="check-content">
                    <div class="check-title">Sanción Aplicada</div>
                    <div class="check-description"><strong>${sanction.name}</strong> (Nivel: ${sanction.level.replace('_', ' ').toUpperCase()})</div>
                </div>
            </div>`;

            // ARTÍCULOS APLICABLES
            html += '<div class="analysis-section-title">📚 ARTÍCULOS DEL MANUAL QUE APLICAN</div>';
            html += '<div class="articles-list">';
            
            const articles = getApplicableArticles(sanction.level, listened === 'yes', informed === 'yes');
            articles.forEach(article => {
                html += `<div class="article-item"><strong>${article.article}</strong> - ${article.text}</div>`;
            });

            html += '</div>';

            // COMPARACIÓN DE VERSIONES
            html += '<div class="analysis-section-title">🔍 COMPARACIÓN DE VERSIONES</div>';
            html += `<div class="check-item">
                <div class="icon">👨‍🏫</div>
                <div class="check-content">
                    <div class="check-title">Versión del Profesor</div>
                    <div class="check-description">${professorVersion}</div>
                </div>
            </div>`;

            html += `<div class="check-item">
                <div class="icon">👤</div>
                <div class="check-content">
                    <div class="check-title">Tu Versión</div>
                    <div class="check-description">${yourVersion}</div>
                </div>
            </div>`;

            // RECOMENDACIONES
            html += '<div class="analysis-section-title">💡 RECOMENDACIONES</div>';
            html += '<div class="recommendation-box">';
            html += '<div class="rec-title">¿Qué puedes hacer?</div>';

            if (verdictColor === 'red') {
                html += '<div class="rec-item">Solicita una entrevista inmediata con el coordinador de convivencia</div>';
                html += '<div class="rec-item">Presenta un escrito formal argumentando la violación de tus derechos</div>';
                html += '<div class="rec-item">Adjunta esta evaluación como evidencia</div>';
                html += '<div class="rec-item">Pide el apoyo de tus padres/acudientes</div>';
                html += '<div class="rec-item">Contacta al personero estudiantil si es necesario</div>';
            } else if (verdictColor === 'yellow') {
                html += '<div class="rec-item">Presenta descargos por escrito argumentando la desproporción</div>';
                html += '<div class="rec-item">Solicita una revisión de la sanción ante el comité de convivencia</div>';
                html += '<div class="rec-item">Reúnete con tus padres/acudientes para preparar la apelación</div>';
                html += '<div class="rec-item">Documenta cualquier evidencia que justifique tu versión</div>';
            } else {
                html += '<div class="rec-item">Aunque la sanción fue justa, puedes conocer tus derechos</div>';
                html += '<div class="rec-item">Reflexiona sobre lo sucedido y mejora tu comportamiento</div>';
                html += '<div class="rec-item">Si aún tienes dudas, puedes hablar con el orientador</div>';
            }

            html += '</div>';

            // DOCUMENTOS A SOLICITAR
            html += '<div class="recommendation-box" style="background: #600000;">';
            html += '<div class="rec-title">📄 Documentos que debes solicitar</div>';
            html += '<div class="rec-item">Copia de la resolución de sanción</div>';
            html += '<div class="rec-item">Acta del proceso disciplinario (debe incluir tu versión)</div>';
            html += '<div class="rec-item">Evidencia presentada contra ti</div>';
            html += '<div class="rec-item">Artículos específicos del manual de convivencia incumplidos</div>';
            html += '<div class="rec-item">Formato para presentar recurso de apelación</div>';
            html += '</div>';

            return html;
        }

        function getSemaphoreIcon(color) {
            switch(color) {
                case 'green': return '🟢';
                case 'yellow': return '🟡';
                case 'red': return '🔴';
                default: return '⚪';
            }
        }

        function getApplicableArticles(faultLevel, wasListened, wasInformed) {
            const articles = [
                { article: 'Cap. 1, Art. 1', text: 'Todo estudiante tiene derecho a ser escuchado antes de cualquier sanción' },
                { article: 'Cap. 1, Art. 5', text: 'Las sanciones deben ser proporcionales a la falta' },
                { article: 'Cap. 1, Art. 6', text: 'El estudiante tiene derecho a presentar descargos' },
                { article: 'Cap. 2, Art. 1', text: 'Ante una falta, el profesor debe dialogar primero con el estudiante' },
                { article: 'Cap. 2, Art. 3', text: 'La sanción debe corresponder al tipo de falta (leve, grave, muy grave)' }
            ];

            if (faultLevel === 'grave' || faultLevel === 'muy_grave') {
                articles.push({ article: 'Cap. 2, Art. 4', text: 'El acudiente debe ser informado en caso de faltas graves' });
            }

            if (!wasListened) {
                articles.push({ article: 'Cap. 2, Art. 1', text: 'Se violó el derecho a diálogo previo' });
            }

            articles.push({ article: 'Cap. 2, Art. 5', text: 'El estudiante puede apelar cualquier sanción ante el comité de convivencia' });

            return articles;
        }
    </script>

</html>
