<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Tu sanción fue justa?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #FFD700;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Encabezado estilo tribunal */
        header {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            border: 3px solid #FFD700;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #E6C200;
            font-style: italic;
            font-weight: 300;
        }

        /* Contenedor principal */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(45, 45, 45, 0.9);
            border: 2px solid #FFD700;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* PANEL DE ESTADÍSTICAS */
        .statistics-panel {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .stats-title {
            color: #FFD700;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #2d2d2d;
            border: 1px solid #FFD700;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #E6C200;
            font-size: 0.95em;
            font-weight: normal;
        }

        /* Barra de progreso de justicia */
        .justice-bar-container {
            margin-top: 25px;
        }

        .justice-bar-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .justice-bar {
            height: 35px;
            background: #1a1a1a;
            border: 2px solid #FFD700;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            margin-bottom: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .bar-justa {
            background: linear-gradient(90deg, #22C55E, #16A34A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-injusta {
            background: linear-gradient(90deg, #EF4444, #DC2626);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            transition: width 0.5s ease;
        }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #E6C200;
        }

        .bar-label-justa {
            color: #22C55E;
            font-weight: bold;
        }

        .bar-label-injusta {
            color: #EF4444;
            font-weight: bold;
        }

        /* Derechos más violados */
        .rights-violation-section {
            margin-top: 25px;
        }

        .rights-violation-title {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .rights-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-item {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .right-name {
            color: #E6C200;
            flex: 1;
        }

        .right-count {
            background: #8B0000;
            color: #FFD700;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .no-data {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 15px;
        }

        .stat-card.no-cases {
            grid-column: 1 / -1;
        }

        /* Formulario */
        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #FFD700;
            font-weight: bold;
            font-size: 1.1em;
        }

        select,
        textarea,
        input[type="radio"] {
            padding: 10px;
            border: 2px solid #FFD700;
            background-color: #1a1a1a;
            color: #FFD700;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 1em;
        }

        select {
            width: 100%;
            cursor: pointer;
        }

        select option {
            background-color: #1a1a1a;
            color: #FFD700;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            font-family: Arial, sans-serif;
        }

        /* Opciones de radio */
        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-group label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            font-weight: normal;
            gap: 10px;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin: 0;
            padding: 0;
        }

        /* Botón */
        button {
            background: linear-gradient(135deg, #8B0000 0%, #600000 100%);
            color: #FFD700;
            padding: 15px 40px;
            border: 2px solid #FFD700;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-clear {
            background: linear-gradient(135deg, #600000 0%, #8B0000 100%);
            padding: 10px 20px;
            font-size: 0.9em;
            width: auto;
            margin-top: 10px;
        }

        /* Área de análisis */
        .analysis-section {
            margin-top: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border: 2px solid #FFD700;
            border-radius: 10px;
            padding: 30px;
            display: none;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
            max-height: 80vh;
            overflow-y: auto;
        }

        .analysis-section.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cargando */
        .loading-container {
            text-align: center;
            padding: 40px 20px;
        }

        .loading-text {
            color: #FFD700;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Semáforo */
        .semaphore {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            border-radius: 10px;
        }

        .semaphore-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .semaphore.green {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid #22C55E;
        }

        .semaphore.green .semaphore-icon {
            color: #22C55E;
        }

        .semaphore.green .semaphore-title {
            color: #22C55E;
        }

        .semaphore.yellow {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #EAB308;
        }

        .semaphore.yellow .semaphore-icon {
            color: #EAB308;
        }

        .semaphore.yellow .semaphore-title {
            color: #EAB308;
        }

        .semaphore.red {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #EF4444;
        }

        .semaphore.red .semaphore-icon {
            color: #EF4444;
        }

        .semaphore.red .semaphore-title {
            color: #EF4444;
        }

        .semaphore-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .semaphore-description {
            color: #E6C200;
            font-size: 1.1em;
        }

        /* Contenido de análisis */
        .analysis-content {
            color: #E6C200;
            line-height: 1.8;
        }

        .analysis-content h2 {
            color: #FFD700;
            font-size: 1.3em;
            margin-top: 20px;
            margin-bottom: 12px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 8px;
        }

        .analysis-content h2:first-child {
            margin-top: 0;
        }

        .analysis-content strong {
            color: #FFD700;
        }

        .analysis-content ul,
        .analysis-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .analysis-content li {
            margin-bottom: 8px;
        }

        .analysis-content p {
            margin-bottom: 12px;
        }

        /* Mensaje de error */
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #EF4444;
            color: #EF4444;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* API Key warning */
        .api-key-warning {
            background: rgba(234, 179, 8, 0.2);
            border: 2px solid #EAB308;
            color: #EAB308;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        /* SECCIÓN DE CASOS SIMILARES */
        .similar-cases-section {
            background: #8B0000;
            border: 2px solid #FFD700;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .similar-cases-title {
            color: #FFD700;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .similar-case-card {
            background: #2d2d2d;
            border-left: 4px solid #FFD700;
            padding: 15px;
            margin: 12px 0;
            border-radius: 5px;
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .case-date {
            color: #E6C200;
            font-size: 0.9em;
            font-style: italic;
        }

        .case-verdict {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .case-verdict.justa {
            background: rgba(34, 197, 94, 0.3);
            color: #22C55E;
            border: 1px solid #22C55E;
        }

        .case-verdict.injusta {
            background: rgba(239, 68, 68, 0.3);
            color: #EF4444;
            border: 1px solid #EF4444;
        }

        .case-fault {
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .case-sanction {
            color: #E6C200;
            margin-bottom: 8px;
        }

        .no-cases {
            color: #E6C200;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .similarity-score {
            color: #FFD700;
            font-size: 0.9em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #FFD700;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 1em;
            }

            .container {
                padding: 20px;
                border: 2px solid #FFD700;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .radio-group {
                flex-direction: column;
                gap: 15px;
            }

            button {
                padding: 12px 30px;
                font-size: 1em;
            }

            .semaphore-icon {
                font-size: 3em;
            }

            .semaphore-title {
                font-size: 1.4em;
            }

            .case-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .analysis-section {
                max-height: 70vh;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 30px 15px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .container {
                padding: 15px;
            }

            label {
                font-size: 1em;
            }

            .analysis-section {
                padding: 20px;
                max-height: 60vh;
            }

            .semaphore-icon {
                font-size: 2.5em;
            }

            .semaphore-title {
                font-size: 1.2em;
            }

            .stats-title {
                font-size: 1.2em;
            }

            .stat-number {
                font-size: 2em;
            }

            .justice-bar-title {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚖️ ¿TU SANCIÓN FUE JUSTA? ⚖️</h1>
        <p class="subtitle">Analiza si la sanción que recibiste cumple con el manual de convivencia</p>
    </header>

    <div class="container">
        <!-- PANEL DE ESTADÍSTICAS -->
        <div class="statistics-panel" id="statisticsPanel">
            <div class="stats-title">📊 ESTADÍSTICAS GENERALES</div>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card no-cases">
                    <div class="no-data">Aún no hay casos analizados. ¡Sé el primero en analizar tu sanción!</div>
                </div>
            </div>
        </div>

        <form id="sanctionForm" class="form-section">
            <!-- Tipo de sanción -->
            <div class="form-group">
                <label for="sanctionType">1. ¿Qué sanción recibiste?</label>
                <select id="sanctionType" required>
                    <option value="">-- Selecciona una opción --</option>
                    <option value="observation">Anotación en observador</option>
                    <option value="citation">Citación a acudientes</option>
                    <option value="suspension">Suspensión</option>
                    <option value="other">Otra</option>
                </select>
            </div>

            <!-- Versión del profesor -->
            <div class="form-group">
                <label for="professorVersion">2. ¿Qué hiciste según el profesor?</label>
                <textarea id="professorVersion" placeholder="Escribe lo que el profesor dice que hiciste..." required></textarea>
            </div>

            <!-- Tu versión -->
            <div class="form-group">
                <label for="yourVersion">3. Tu versión de los hechos</label>
                <textarea id="yourVersion" placeholder="Cuéntanos qué pasó según tú..." required></textarea>
            </div>

            <!-- Te escucharon -->
            <div class="form-group">
                <label>4. ¿Te escucharon antes de aplicar la sanción?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="listened" value="yes" required>
                        Sí
                    </label>
                    <label>
                        <input type="radio" name="listened" value="no" required>
                        No
                    </label>
                </div>
            </div>

            <!-- Te informaron a tus acudientes -->
            <div class="form-group">
                <label>5. ¿Te informaron o informaron a tus acudientes de la sanción?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="informed" value="yes" required>
                        Sí
                    </label>
                    <label>
                        <input type="radio" name="informed" value="no" required>
                        No
                    </label>
                </div>
            </div>

            <!-- Botón -->
            <button id="analyzeBtn" type="submit">ANALIZAR SANCIÓN CON IA 🤖</button>
        </form>

        <!-- Área de análisis -->
        <div class="analysis-section" id="analysisSection">
            <div id="analysisContent"></div>
            <button class="btn-clear" id="clearBtn">Limpiar</button>
        </div>
    </div>

    <script>
        // ==========================================
        // API KEY DE GOOGLE GEMINI - PEGA TU KEY AQUI
        // ==========================================
        const GEMINI_API_KEY = "PEGAR_MI_KEY_AQUI";

        // MANUAL DE CONVIVENCIA
        const manualConvivencia = `CAPÍTULO 1 - DERECHOS DEL ESTUDIANTE
1. Todo estudiante tiene derecho a ser escuchado antes de cualquier sanción.
2. Los objetos decomisados deben ser devueltos al finalizar la jornada escolar.
3. Ningún estudiante puede ser expulsado de clase sin una razón documentada.
4. El estudiante tiene derecho a conocer las pruebas en su contra.
5. Las sanciones deben ser proporcionales a la falta.
6. El estudiante tiene derecho a presentar descargos.

CAPÍTULO 2 - PROCESO DISCIPLINARIO
1. Ante una falta, el profesor debe dialogar primero con el estudiante.
2. Se debe dejar constancia escrita de la falta y la versión del estudiante.
3. La sanción debe corresponder al tipo de falta (leve, grave, muy grave).
4. El acudiente debe ser informado en caso de faltas graves.
5. El estudiante puede apelar cualquier sanción ante el comité de convivencia.

CAPÍTULO 3 - FALTAS Y SANCIONES
Falta leve: Llamado de atención verbal. No genera anotación.
Falta grave: Anotación en el observador. Citación a acudientes.
Falta muy grave: Suspensión temporal. Matrícula condicional.`;

        // BASE DE DATOS DE CASOS
        let caseHistory = [];
        let violationTracker = {
            'No fue escuchado': 0,
            'No se informó a acudientes': 0,
            'Sanción desproporcionada': 0,
            'Falta debido proceso': 0
        };

        // ==========================================
        // CARGAR CASOS DEL LOCALSTORAGE
        // ==========================================
        function loadCases() {
            const stored = localStorage.getItem('caseHistory');
            const violationStored = localStorage.getItem('violationTracker');
            
            if (stored) {
                caseHistory = JSON.parse(stored);
            }
            if (violationStored) {
                violationTracker = JSON.parse(violationStored);
            }
            
            updateStatistics();
        }

        // ==========================================
        // GUARDAR CASOS EN LOCALSTORAGE
        // ==========================================
        function saveCases() {
            localStorage.setItem('caseHistory', JSON.stringify(caseHistory));
            localStorage.setItem('violationTracker', JSON.stringify(violationTracker));
        }

        // ==========================================
        // ACTUALIZAR ESTADÍSTICAS
        // ==========================================
        function updateStatistics() {
            const totalCases = caseHistory.length;
            
            if (totalCases === 0) {
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card no-cases">
                        <div class="no-data">Aún no hay casos analizados. ¡Sé el primero en analizar tu sanción!</div>
                    </div>
                `;
                return;
            }

            const justaCases = caseHistory.filter(c => c.veredicto === 'justa').length;
            const injustaCases = caseHistory.filter(c => c.veredicto === 'injusta').length;
            const porcentajeJusta = Math.round((justaCases / totalCases) * 100);
            const porcentajeInjusta = 100 - porcentajeJusta;

            const sortedViolations = Object.entries(violationTracker)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${totalCases}</div>
                        <div class="stat-label">Casos Analizados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: ${porcentajeJusta >= 50 ? '#22C55E' : '#EF4444'};">${porcentajeJusta}%</div>
                        <div class="stat-label">Sanciones Justas</div>
                    </div>
                </div>

                <div class="justice-bar-container">
                    <div class="justice-bar-title">⚖️ DISTRIBUCIÓN: JUSTAS vs INJUSTAS</div>
                    <div class="justice-bar">
                        <div class="bar-justa" style="width: ${porcentajeJusta}%;">
                            ${porcentajeJusta > 10 ? porcentajeJusta + '%' : ''}
                        </div>
                        <div class="bar-injusta" style="width: ${porcentajeInjusta}%;">
                            ${porcentajeInjusta > 10 ? porcentajeInjusta + '%' : ''}
                        </div>
                    </div>
                    <div class="bar-labels">
                        <span class="bar-label-justa">✅ ${justaCases} Justas</span>
                        <span class="bar-label-injusta">❌ ${injustaCases} Injustas</span>
                    </div>
                </div>

                <div class="rights-violation-section">
                    <div class="rights-violation-title">⚠️ DERECHOS MÁS VIOLADOS</div>
                    <div class="rights-list">
                        ${sortedViolations.length > 0 ? sortedViolations.map(([right, count]) => `
                            <div class="right-item">
                                <div class="right-name">${right}</div>
                                <div class="right-count">${count}</div>
                            </div>
                        `).join('') : '<div class="no-data">No se han registrado violaciones</div>'}
                    </div>
                </div>
            `;

            document.getElementById('statsGrid').innerHTML = html;
        }

        // ==========================================
        // AGREGAR CASO AL HISTORIAL
        // ==========================================
        function addCase(fault, sanction, verdict, violations) {
            const newCase = {
                id: Date.now(),
                fecha: new Date().toLocaleDateString('es-ES'),
                falta: fault,
                sancion: sanction,
                veredicto: verdict
            };
            caseHistory.unshift(newCase);
            
            violations.forEach(violation => {
                if (violationTracker.hasOwnProperty(violation)) {
                    violationTracker[violation]++;
                }
            });
            
            saveCases();
            updateStatistics();
        }

        // ==========================================
        // FUNCIÓN PRINCIPAL: ANALIZAR CON IA
        // ==========================================
        async function analizarConIA(tipoSancion, versionProfesor, versionEstudiante) {
            // Validar API Key
            if (GEMINI_API_KEY === "PEGAR_MI_KEY_AQUI" || !GEMINI_API_KEY) {
                mostrarError("❌ Error: Debes agregar tu API key de Google Gemini en el código. Ve a la línea que dice 'const GEMINI_API_KEY' y reemplaza 'PEGAR_MI_KEY_AQUI' con tu clave real.");
                return;
            }

            // Mostrar cargando
            mostrarCargando();

            // Construir el prompt
            const prompt = `Eres un abogado estudiantil experto en derechos de los estudiantes y en derecho administrativo. Analiza el siguiente caso de sanción escolar con rigor legal.

MANUAL DE CONVIVENCIA DEL COLEGIO:
${manualConvivencia}

CASO A ANALIZAR:
- Tipo de sanción recibida: ${tipoSancion}
- Versión del profesor: ${versionProfesor}
- Versión del estudiante: ${versionEstudiante}

Por favor, proporciona un análisis detallado que incluya:

1) **ARTÍCULOS APLICABLES**: ¿Qué artículos del manual de convivencia aplican a este caso? Cita específicamente cada uno.

2) **PROPORCIONALIDAD**: ¿Es la sanción proporcional a la falta cometida? Explica por qué sí o por qué no.

3) **DEBIDO PROCESO**: ¿Se respetó el debido proceso? Considera: ¿fue escuchado el estudiante? ¿se le informó a los acudientes si era necesario?

4) **VEREDICTO FINAL**: Basándote en tu análisis, ¿consideras que la sanción es JUSTA o INJUSTA? Sé claro y directo en tu conclusión.

5) **RECOMENDACIONES**: ¿Qué acciones concretas puede tomar el estudiante? Si la sanción fue injusta, ¿cómo puede apelar?

Proporciona un análisis profesional, imparcial y fundamentado en los derechos estudiantiles.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    const errorMsg = errorData.error?.message || 'Error desconocido en la API';
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const analisisIA = data.contents[0].parts[0].text;

                // Procesar resultado
                procesarResultadoIA(analisisIA, versionProfesor, versionEstudiante, tipoSancion);

            } catch (error) {
                console.error('Error:', error);
                mostrarError(`❌ Error al conectar con la IA: ${error.message}`);
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        // ==========================================
        // PROCESAR RESULTADO DE LA IA
        // ==========================================
        function procesarResultadoIA(analisisIA, versionProfesor, versionEstudiante, tipoSancion) {
            // Determinar si fue justa o injusta
            const textoLower = analisisIA.toLowerCase();
            const esInjusta = textoLower.includes('injusta');
            const esJusta = textoLower.includes('justa') && !esInjusta;

            // Determinar color del semáforo
            let colorSemaforo = 'green';
            let iconoSemaforo = '🟢';
            let tituloVeredicto = 'SANCIÓN JUSTA ✅';
            
            if (esInjusta) {
                colorSemaforo = 'red';
                iconoSemaforo = '🔴';
                tituloVeredicto = 'SANCIÓN INJUSTA ❌';
            } else if (textoLower.includes('desproporcionada')) {
                colorSemaforo = 'yellow';
                iconoSemaforo = '🟡';
                tituloVeredicto = 'SANCIÓN DESPROPORCIONADA ⚠️';
            }

            // Construir HTML
            let html = `
                <div class="semaphore ${colorSemaforo}">
                    <div class="semaphore-icon">${iconoSemaforo}</div>
                    <div class="semaphore-title">${tituloVeredicto}</div>
                    <div class="semaphore-description">Análisis realizado por Inteligencia Artificial (Google Gemini 2.0)</div>
                </div>

                <div class="analysis-content">
                    ${formatearAnalisisIA(analisisIA)}
                </div>
            `;

            // Mostrar resultado
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');

            // Guardar en historial
            const verdictType = esInjusta ? 'injusta' : 'justa';
            const sanctionName = {
                observation: 'Anotación en observador',
                citation: 'Citación a acudientes',
                suspension: 'Suspensión',
                other: 'Otra sanción'
            }[tipoSancion];

            addCase(versionProfesor, sanctionName, verdictType, []);

            // Desplazarse al análisis
            setTimeout(() => {
                document.getElementById('analysisSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            // Habilitar botón
            document.getElementById('analyzeBtn').disabled = false;
        }

        // ==========================================
        // FORMATEAR TEXTO DE LA IA
        // ==========================================
        function formatearAnalisisIA(texto) {
            let formateado = texto
                // Convertir **texto** a <strong>
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                // Convertir ### a <h2>
                .replace(/###\s+(.+)/g, '<h2>$1</h2>')
                // Convertir ## a <h2>
                .replace(/##\s+(.+)/g, '<h2>$1</h2>')
                // Convertir # a <h2>
                .replace(/#\s+(.+)/g, '<h2>$1</h2>')
                // Convertir saltos de línea dobles a párrafos
                .replace(/\n\n+/g, '</p><p>')
                // Convertir listas numeradas
                .replace(/^\d+\)\s+/gm, '<br>$&')
                // Convertir guiones a viñetas
                .replace(/^-\s+/gm, '<br>• ');
            
            return '<p>' + formateado + '</p>';
        }

        // ==========================================
        // MOSTRAR CARGANDO
        // ==========================================
        function mostrarCargando() {
            const html = `
                <div class="loading-container">
                    <div class="loading-text">
                        ⚖️ La IA está analizando tu caso...
                    </div>
                    <div class="loading-spinner"></div>
                    <p style="color: #E6C200; margin-top: 20px; font-size: 0.95em;">
                        Esto puede tomar de 5 a 15 segundos. Por favor, espera...
                    </p>
                </div>
            `;
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');
            document.getElementById('analyzeBtn').disabled = true;
        }

        // ==========================================
        // MOSTRAR ERROR
        // ==========================================
        function mostrarError(mensaje) {
            const html = `
                <div class="error-message">
                    ${mensaje}
                </div>
            `;
            document.getElementById('analysisContent').innerHTML = html;
            document.getElementById('analysisSection').classList.add('active');
            document.getElementById('analyzeBtn').disabled = false;
        }

        // ==========================================
        // EVENTOS DEL FORMULARIO
        // ==========================================
        const form = document.getElementById('sanctionForm');
        const clearBtn = document.getElementById('clearBtn');

        // Cargar casos al iniciar
        loadCases();

        // Envío del formulario
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const sanctionType = document.getElementById('sanctionType').value;
            const professorVersion = document.getElementById('professorVersion').value;
            const yourVersion = document.getElementById('yourVersion').value;

            // Llamar a la IA
            await analizarConIA(sanctionType, professorVersion, yourVersion);
        });

        // Limpiar análisis
        clearBtn.addEventListener('click', function() {
            form.reset();
            document.getElementById('analysisSection').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
